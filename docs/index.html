<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITPULSE · West Asia OSINT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css">
<style>
:root {
  --bg0:#03060b;
  --bg1:rgba(6,10,18,0.92);
  --bg2:rgba(10,16,28,0.85);
  --bg3:rgba(14,22,38,0.8);
  --bg4:rgba(20,32,52,0.7);
  --bg5:#152030;
  --bd1:rgba(25,50,90,0.2);
  --bd2:rgba(35,70,120,0.22);
  --bd3:rgba(50,90,150,0.25);
  --glass:rgba(255,255,255,0.02);
  --t0:#d8e8f8;--t1:#7aa8c8;--t2:#4a7090;--t3:#223850;
  --blue:#2d8cf0;--bluel:#5aa8f0;--blued:#1060b8;
  --green:#00d878;--red:#e84050;--orange:#e88820;--amber:#e8b020;
  --purple:#9070e8;--cyan:#00c0d8;
  --sb:280px;--dp:380px;--tb:48px;--stb:26px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg0);color:var(--t0);font-size:13px;
  -webkit-font-smoothing:antialiased}

/* ═══ TOP BAR ═══ */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--tb);
  background:rgba(8,14,28,0.82);
  backdrop-filter:blur(24px) saturate(1.6);
  -webkit-backdrop-filter:blur(24px) saturate(1.6);
  border-bottom:1px solid rgba(60,130,220,0.12);
  display:flex;align-items:center;padding:0 18px;gap:12px;z-index:200;
  box-shadow:0 4px 30px rgba(0,0,0,0.4)}
#topbar::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 10%,var(--blue),var(--purple),transparent 90%);
  background-size:200% 100%;animation:gradSlide 12s linear infinite;opacity:0.5}
@keyframes gradSlide{0%{background-position:0% 0%}100%{background-position:200% 0%}}
.brand{font-size:15px;font-weight:700;letter-spacing:2.5px;
  text-transform:uppercase;flex-shrink:0;color:var(--t0)}
.brand-sep{color:var(--t3);margin:0 3px;font-weight:300}
.brand-sub{font-size:11px;letter-spacing:1.5px;color:var(--t2);font-weight:500}
.vdiv{width:1px;height:22px;background:var(--bd2);flex-shrink:0}
.rpill{font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--t1);background:rgba(255,255,255,0.04);
  border:1px solid var(--bd1);padding:3px 10px;border-radius:4px;white-space:nowrap}
.chips{display:flex;align-items:center;gap:7px;margin-left:auto}
.chip{display:flex;align-items:center;gap:5px;font-size:10px;
  color:var(--t2);padding:4px 10px;background:rgba(255,255,255,0.03);
  border:1px solid var(--bd1);border-radius:6px;transition:all .2s;letter-spacing:.3px;
  font-weight:500}
.chip.live{color:var(--t1);border-color:var(--bd2);background:rgba(59,155,255,0.05)}
.chip.err{color:var(--red);border-color:rgba(255,68,85,.25)}
.led{width:7px;height:7px;border-radius:50%;background:var(--t3);
  flex-shrink:0;transition:background .3s}
.led.live{background:var(--green);box-shadow:0 0 8px var(--green);
  animation:bp 2.5s ease-in-out infinite}
.led.stale{background:var(--amber);box-shadow:0 0 6px rgba(255,196,46,0.3)}
.led.err{background:var(--red);box-shadow:0 0 6px rgba(255,68,85,0.3)}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.3}}
#clock{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--t1);letter-spacing:.5px;min-width:84px;text-align:right;font-weight:500}

/* ═══ SIDEBAR ═══ */
#sb{position:fixed;top:var(--tb);left:0;bottom:var(--stb);
  width:var(--sb);
  background:rgba(8,14,28,0.82);
  backdrop-filter:blur(20px) saturate(1.5);
  -webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-right:1px solid rgba(60,130,220,0.1);
  z-index:100;display:flex;flex-direction:column;overflow:hidden}

/* Stats grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:10px 12px}
.stat-card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);
  border-radius:6px;padding:8px 8px 7px;text-align:center;position:relative;
  overflow:hidden;transition:all .2s}
.stat-card:hover{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.07)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:var(--accent);opacity:0.4}
.stat-icon{font-size:13px;margin-bottom:1px;opacity:0.6}
.stat-val{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;
  color:var(--accent);line-height:1.2}
.stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1.2px;
  color:var(--t2);margin-top:2px;font-weight:600}

/* Tab bar */
.tab-bar{display:flex;border-bottom:1px solid var(--bd1);padding:0 10px;flex-shrink:0}
.tab{flex:1;padding:10px 0 8px;background:none;border:none;
  border-bottom:2px solid transparent;color:var(--t3);
  font-size:10px;font-weight:600;cursor:pointer;transition:all .2s;
  font-family:inherit;text-transform:uppercase;letter-spacing:1px}
.tab:hover{color:var(--t2)}
.tab.active{color:var(--bluel);border-bottom-color:var(--blue)}
.tab-panel{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.tab-panel.active{display:flex}

.sbs{border-bottom:1px solid var(--bd1);flex-shrink:0}
.sbh{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.sbh h3{font-size:10px;text-transform:uppercase;letter-spacing:1.3px;color:var(--t2);font-weight:600}
.sbh .sbn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t1)}
.sbd{padding:2px 14px 10px}
.lrow{display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer;
  user-select:none;transition:opacity .15s}
.lrow:not(.on){opacity:.35}
.lrow:hover{opacity:.75}
.lrow.on{opacity:1}
.lchk{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--bd3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lrow.on .lchk{background:var(--blue);border-color:var(--blue)}
.lrow.on .lchk::after{content:'✓';font-size:8px;color:#fff;line-height:1}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lname{font-size:12px;color:var(--t0);flex:1;font-weight:400}
.lcnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);font-weight:500}
.mrow{display:flex;gap:5px;flex-wrap:wrap;padding:3px 0}
.mbtn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;
  letter-spacing:.5px;border-radius:4px;cursor:pointer;font-weight:500;
  background:rgba(255,255,255,0.03);border:1px solid var(--bd2);
  color:var(--t2);transition:all .15s}
.mbtn:hover{color:var(--t0);border-color:var(--bd3);background:rgba(255,255,255,0.06)}
.mbtn.on{color:var(--bluel);border-color:var(--blue);background:rgba(59,155,255,.1)}
.strow{display:flex;align-items:center;gap:7px;padding:4px 0}
.stn{font-size:10px;color:var(--t1);width:76px;flex-shrink:0;font-weight:500}
.stb-w{flex:1;height:4px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.stb-f{height:100%;border-radius:3px;transition:width .5s ease}
.stc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);
  width:24px;text-align:right;font-weight:500}
.swrap{padding:8px 14px;border-bottom:1px solid var(--bd1);flex-shrink:0}
.swrap input{width:100%;padding:7px 10px;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--bd1);border-radius:6px;color:var(--t0);
  font-size:11px;font-family:inherit;outline:none;transition:all .2s}
.swrap input::placeholder{color:var(--t3)}
.swrap input:focus{border-color:var(--blue);background:rgba(59,155,255,0.05);
  box-shadow:0 0 0 3px rgba(59,155,255,0.08)}
#evlist,#shiplist{flex:1;overflow-y:auto;min-height:0}
#evlist::-webkit-scrollbar,#shiplist::-webkit-scrollbar{width:4px}
#evlist::-webkit-scrollbar-thumb,#shiplist::-webkit-scrollbar-thumb{
  background:var(--bd3);border-radius:3px}
.ei{display:flex;align-items:flex-start;gap:9px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.03);border-left:3px solid transparent;
  transition:all .12s;border-radius:0 6px 6px 0;margin:1px 4px}
.ei:hover{background:rgba(255,255,255,0.04)}
.ei.sel{background:rgba(59,155,255,0.08);border-left-color:var(--blue)}
.eidot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0;
  box-shadow:0 0 6px currentColor}
.eibody{flex:1;min-width:0}
.eititle{font-size:12px;color:var(--t0);line-height:1.45;font-weight:400;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eimeta{display:flex;gap:6px;margin-top:3px;font-size:9px;color:var(--t2);align-items:center}
.eitag{background:rgba(255,255,255,0.06);padding:1px 6px;border-radius:3px;font-weight:500}
.eitime{color:var(--t3);font-family:'JetBrains Mono',monospace;font-size:9px}

/* Ship list items */
.si{display:flex;align-items:center;gap:9px;padding:10px 14px;cursor:pointer;
  border-bottom:1px solid rgba(255,255,255,0.03);transition:all .12s;
  border-radius:0 6px 6px 0;margin:1px 4px}
.si:hover{background:rgba(255,255,255,0.04)}
.si.sel{background:rgba(0,212,232,0.08);border-left:3px solid var(--cyan)}
.si-flag{font-size:18px;flex-shrink:0}
.si-body{flex:1;min-width:0}
.si-name{font-size:12px;color:var(--t0);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-meta{display:flex;gap:6px;margin-top:2px;font-size:9px;color:var(--t2);align-items:center}
.si-type{background:rgba(0,212,232,0.1);color:var(--cyan);padding:1px 6px;
  border-radius:3px;font-weight:500;font-size:8px;text-transform:uppercase;letter-spacing:0.5px}
.si-dest{color:var(--t1);font-family:'JetBrains Mono',monospace}

/* ═══ MAP ═══ */
#map{position:fixed;top:var(--tb);left:var(--sb);right:0;bottom:var(--stb);
  transition:right .22s ease}
#map.dpo{right:var(--dp)}
.maplibregl-ctrl-attrib{font-size:9px!important;opacity:.35!important}
.maplibregl-ctrl-group{
  background:rgba(8,14,28,0.8)!important;
  backdrop-filter:blur(12px)!important;
  border:1px solid rgba(60,130,220,0.15)!important;
  border-radius:8px!important;
  box-shadow:0 4px 16px rgba(0,0,0,.5)!important}
.maplibregl-ctrl button{background:transparent!important}
.maplibregl-ctrl button span{filter:invert(.55)}

/* ═══ DETAIL PANEL ═══ */
#dp{position:fixed;top:var(--tb);right:0;bottom:var(--stb);
  width:var(--dp);
  background:rgba(8,14,28,0.85);
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-left:1px solid rgba(60,130,220,0.12);
  z-index:150;transform:translateX(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:-4px 0 30px rgba(0,0,0,0.3)}
#dp.open{transform:translateX(0)}
.dph{display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-bottom:1px solid var(--bd1);flex-shrink:0}
.dptag{font-family:'JetBrains Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:1px;font-weight:600;
  padding:3px 8px;border-radius:4px;flex-shrink:0}
.dptitle{font-size:14px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t0)}
.dpx{background:none;border:none;color:var(--t2);cursor:pointer;
  font-size:18px;padding:2px 6px;border-radius:4px;line-height:1;transition:all .15s}
.dpx:hover{color:var(--t0);background:rgba(255,255,255,0.06)}
.dpbody{flex:1;overflow-y:auto;padding:16px}
.dpbody::-webkit-scrollbar{width:4px}
.dpbody::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:3px}
.dpcoords{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--bluel);background:rgba(59,155,255,0.06);
  border:1px solid rgba(59,155,255,0.15);
  padding:8px 12px;border-radius:8px;margin-bottom:16px;
  display:flex;justify-content:space-between;align-items:center;font-weight:500}
.dpf{margin-bottom:14px}
.dplbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;
  color:var(--t2);margin-bottom:4px;font-weight:600}
.dpval{font-size:13px;color:var(--t0);line-height:1.6}
.dpval a{color:var(--bluel);text-decoration:none;font-weight:500}
.dpval a:hover{text-decoration:underline}
.dpgauge{height:6px;background:rgba(255,255,255,0.05);border-radius:4px;
  margin-top:5px;overflow:hidden}
.dpgf{height:100%;border-radius:4px;transition:width .5s}
.dpmag{font-family:'JetBrains Mono',monospace;font-size:42px;
  font-weight:700;line-height:1;margin-bottom:4px}
.dprow{display:flex;gap:14px}
.dprow .dpf{flex:1}
.dpdiv{border:none;border-top:1px solid var(--bd1);margin:12px 0}
.dpact{padding:12px 16px;border-top:1px solid var(--bd1);
  display:flex;gap:8px;flex-shrink:0}
.dpbtn{flex:1;padding:8px 14px;border-radius:6px;font-size:11px;
  cursor:pointer;font-weight:600;border:1px solid var(--bd2);
  background:rgba(255,255,255,0.03);color:var(--t1);
  transition:all .15s;font-family:inherit}
.dpbtn:hover{background:rgba(255,255,255,0.07);color:var(--t0);border-color:var(--bd3)}
.dpbtn.prim{background:rgba(59,155,255,.12);border-color:rgba(59,155,255,.35);color:var(--bluel)}
.dpbtn.prim:hover{background:rgba(59,155,255,.22)}
.dp-flag{font-size:28px;line-height:1}

/* ═══ STATUS BAR ═══ */
#stbar{position:fixed;bottom:0;left:var(--sb);right:0;
  height:var(--stb);
  background:rgba(8,14,28,0.85);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid rgba(60,130,220,0.1);
  display:flex;align-items:center;padding:0 14px;gap:18px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);z-index:100;
  font-weight:500}
.ss{display:flex;align-items:center;gap:5px}
.ss b{color:var(--bluel);font-weight:600}
.ss-live{display:flex;align-items:center;gap:4px;color:var(--green);font-weight:600;
  font-size:10px;letter-spacing:.5px}
.ss-live::before{content:'';width:6px;height:6px;border-radius:50%;
  background:var(--green);box-shadow:0 0 6px var(--green);animation:bp 2s ease-in-out infinite}
#curpos{margin-left:auto;color:var(--t3)}

/* ═══ TOOLTIP ═══ */
#tip{position:fixed;display:none;z-index:300;
  background:rgba(8,14,28,0.92);
  backdrop-filter:blur(12px);
  border:1px solid var(--bd3);color:var(--t0);font-size:10px;
  padding:5px 10px;border-radius:6px;pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.6);max-width:240px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

/* ═══ VISUAL MODES ═══ */
.nvg #map canvas{filter:brightness(.6) saturate(.15) sepia(.9) hue-rotate(95deg)}
.flir #map canvas{filter:invert(1) sepia(.4) contrast(1.4) saturate(.25)}
.crt #map canvas{filter:brightness(.7) contrast(1.3) sepia(.45) saturate(.7) hue-rotate(18deg)}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">SITPULSE<span class="brand-sep"> / </span><span class="brand-sub">West Asia</span></div>
  <div class="vdiv"></div>
  <div class="rpill">12°N–42°N · 32°E–63°E</div>
  <div class="chips">
    <div class="chip" id="chip-ev"><span class="led" id="led-ev"></span>EVT</div>
    <div class="chip" id="chip-sat"><span class="led" id="led-sat"></span>SAT</div>
    <div class="chip" id="chip-fl"><span class="led" id="led-fl"></span>ADSB</div>
    <div class="chip" id="chip-sh"><span class="led" id="led-sh"></span>AIS</div>
    <div class="vdiv"></div>
    <div id="clock">--:--:-- UTC</div>
  </div>
</div>

<div id="sb">
  <!-- Stats Grid -->
  <div class="stats-grid">
    <div class="stat-card" style="--accent:var(--orange)">
      <div class="stat-icon">⚠</div>
      <div class="stat-val" id="stat-threats">0</div>
      <div class="stat-lbl">Threats</div>
    </div>
    <div class="stat-card" style="--accent:var(--cyan)">
      <div class="stat-icon">⚓</div>
      <div class="stat-val" id="stat-ships">0</div>
      <div class="stat-lbl">Ships</div>
    </div>
    <div class="stat-card" style="--accent:var(--green)">
      <div class="stat-icon">✈</div>
      <div class="stat-val" id="stat-aircraft">0</div>
      <div class="stat-lbl">Aircraft</div>
    </div>
    <div class="stat-card" style="--accent:var(--blue)">
      <div class="stat-icon">🛰</div>
      <div class="stat-val" id="stat-sats">0</div>
      <div class="stat-lbl">Satellites</div>
    </div>
  </div>

  <!-- Tab Bar -->
  <div class="tab-bar">
    <button class="tab active" data-tab="layers">Layers</button>
    <button class="tab" data-tab="events">Events</button>
    <button class="tab" data-tab="vessels">Vessels</button>
  </div>

  <!-- Layers Tab -->
  <div class="tab-panel active" id="panel-layers">
    <div class="sbs">
      <div class="sbh"><h3>Map Layers</h3><span class="sbn" id="total-n">0</span></div>
      <div class="sbd">
        <label class="lrow on" data-layer="events">
          <div class="lchk"></div><div class="ldot" style="background:var(--orange)"></div>
          <span class="lname">Intel Events</span><span class="lcnt" id="cnt-ev">0</span>
        </label>
        <label class="lrow on" data-layer="thermal">
          <div class="lchk"></div><div class="ldot" style="background:var(--red)"></div>
          <span class="lname">Thermal Anomalies</span><span class="lcnt" id="cnt-th">0</span>
        </label>
        <label class="lrow on" data-layer="seismic">
          <div class="lchk"></div><div class="ldot" style="background:var(--purple)"></div>
          <span class="lname">Seismic</span><span class="lcnt" id="cnt-se">0</span>
        </label>
        <label class="lrow on" data-layer="satellites">
          <div class="lchk"></div><div class="ldot" style="background:var(--blue)"></div>
          <span class="lname">Satellites</span><span class="lcnt" id="cnt-sat">0</span>
        </label>
        <label class="lrow on" data-layer="flights">
          <div class="lchk"></div><div class="ldot" style="background:var(--green)"></div>
          <span class="lname">Aircraft (ADS-B)</span><span class="lcnt" id="cnt-fl">0</span>
        </label>
        <label class="lrow on" data-layer="ships">
          <div class="lchk"></div><div class="ldot" style="background:var(--cyan)"></div>
          <span class="lname">Ships (AIS)</span><span class="lcnt" id="cnt-sh">0</span>
        </label>
        <label class="lrow" data-layer="heatmap">
          <div class="lchk"></div><div class="ldot" style="background:linear-gradient(135deg,var(--red),var(--amber))"></div>
          <span class="lname">Heat Density</span>
        </label>
      </div>
    </div>
    <div class="sbs">
      <div class="sbh"><h3>Visual Mode</h3></div>
      <div class="sbd">
        <div class="mrow">
          <button class="mbtn on" data-mode="default">STD</button>
          <button class="mbtn" data-mode="nvg">NVG</button>
          <button class="mbtn" data-mode="flir">FLIR</button>
          <button class="mbtn" data-mode="crt">CRT</button>
        </div>
      </div>
    </div>
    <div class="sbs" style="flex:1;overflow-y:auto">
      <div class="sbh"><h3>Category Breakdown</h3></div>
      <div class="sbd" id="catstats"></div>
    </div>
  </div>

  <!-- Events Tab -->
  <div class="tab-panel" id="panel-events">

function startClock(){
  const el=document.getElementById('clock');
  const t=()=>el.textContent=new Date().toISOString().slice(11,19)+' UTC';
  t();setInterval(t,1000);
}

// ═══════ TABS ═══════
function initTabs(){
  document.querySelectorAll('.tab').forEach(tab=>{
    tab.onclick=()=>{
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-'+tab.dataset.tab).classList.add('active');
    };
  });
}

// ═══════ MAP ═══════
function initMap(){
  map=new maplibregl.Map({
    container:'map',
    style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center:[47,28],zoom:4.2,minZoom:2,maxZoom:18,attributionControl:true
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:true}),'top-right');
  map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-right');
  map.on('mousemove',e=>{
    const el=document.getElementById('curpos');
    el.textContent=e.lngLat.lat.toFixed(3)+'°N  '+e.lngLat.lng.toFixed(3)+'°E';
  });
  map.on('load',()=>{
    addSources();
    addLayers();
    addInteractions();
    startPulse();
    loadData();
  });
}

function addSources(){
  ['ev-src','heat-src','sat-src','fl-src','ship-src','sel-src','track-src'].forEach(id=>{
    map.addSource(id,{type:'geojson',data:{type:'FeatureCollection',features:[]}});
  });
}

function addInteractions(){
  const tip=document.getElementById('tip');
  const cls=['ev-l','th-l','se-l','sat-l','sat-mid','fl-l','fl-dot','ship-icon','ship-dot'];
  const showTip=(e,txt)=>{
    if(!txt)return;
    tip.textContent=txt;tip.style.display='block';
    tip.style.left=(e.originalEvent.clientX+14)+'px';
    tip.style.top=(e.originalEvent.clientY-30)+'px';
  };
  const hideTip=()=>tip.style.display='none';
  cls.forEach(id=>{
    map.on('mouseenter',id,e=>{
      map.getCanvas().style.cursor='pointer';
      const p=e.features[0].properties;
      showTip(e,p.name||p.title||p.cs||p.icao24||'');
    });
    map.on('mouseleave',id,()=>{map.getCanvas().style.cursor='';hideTip();});
    map.on('click',id,e=>{
      e.originalEvent.stopPropagation();hideTip();
      onFeatureClick(e.features[0].properties);
    });
  });
  map.on('click',e=>{
    if(!map.queryRenderedFeatures(e.point,{layers:cls}).length)closeDP();
  });
}

function startPulse(){
  const go=()=>{
    pulsePhase+=0.03;
    if(selLng!==null&&map.getLayer('sel-ring')){
      map.setPaintProperty('sel-ring','circle-radius',13+4*Math.sin(pulsePhase));
      map.setPaintProperty('sel-ring','circle-stroke-opacity',0.5+0.35*Math.sin(pulsePhase));
    }
    if(map.getLayer('sat-glow')){
      const s=Math.sin(pulsePhase*0.7);
      map.setPaintProperty('sat-glow','circle-opacity',0.1+0.07*s);
    }
    if(map.getLayer('fl-glow')){
      const s=Math.sin(pulsePhase*0.9);
      map.setPaintProperty('fl-glow','circle-opacity',0.15+0.1*s);
    }
    if(map.getLayer('ship-glow')){
      const s=Math.sin(pulsePhase*0.6);
      map.setPaintProperty('ship-glow','circle-opacity',0.12+0.08*s);
    }
    requestAnimationFrame(go);
  };
  requestAnimationFrame(go);
}

// ═══════ DATA ═══════
async function loadData(){
  await Promise.all([loadEvents(),loadSats(),loadShips()]);
  loadFlights();setInterval(loadFlights,15000);
  setInterval(()=>{if(flightData.length)pushFlightSrc();},2000);
  setInterval(loadShips,60000);
}

async function loadEvents(){
  try{
    const r=await fetch('data/combined.json?t='+Date.now());
    if(!r.ok)throw 0;
    const d=await r.json();
    allEvents=(d.events&&d.events.length>0)?d.events:SAMPLES;
  }catch{allEvents=SAMPLES;}
  setLed('ev','live');
  pushEventSrc();renderList();renderStats();updateCounts();
  document.getElementById('st-upd').textContent='Updated '+new Date().toISOString().slice(11,16)+'Z';
}

async function loadSats(){
  try{
    const r=await fetch('data/satellites.json?t='+Date.now());
    if(!r.ok)throw 0;
    const d=await r.json();
    satRecs=(d.satellites||[]).map(s=>{
      try{const sr=satellite.twoline2satrec(s.tle1,s.tle2);
        const rec={...s,satrec:sr};satById[s.norad_id]=rec;return rec;}
      catch{return null;}
    }).filter(Boolean);
    setLed('sat','live');
    document.getElementById('cnt-sat').textContent=satRecs.length;
    document.getElementById('st-sat').textContent=satRecs.length;
    animateCounter(document.getElementById('stat-sats'),satRecs.length);
    propSats();setInterval(propSats,3000);
  }catch(e){console.warn('Sats failed',e);setLed('sat','err');}
}

async function loadFlights(){
  try{
    const r=await fetch('https://opensky-network.org/api/states/all?lamin=12&lomin=32&lamax=42&lomax=63');
    if(!r.ok)throw 0;
    const d=await r.json();
    flightData=(d.states||[]).filter(s=>s[5]!=null&&s[6]!=null);
    flightFetchT=Date.now();
    setLed('fl','live');
    document.getElementById('cnt-fl').textContent=flightData.length;
    document.getElementById('st-fl').textContent=flightData.length;
    animateCounter(document.getElementById('stat-aircraft'),flightData.length);
    pushFlightSrc();
  }catch{if(!flightData.length)setLed('fl','stale');}
}

async function loadShips(){
  try{
    const r=await fetch('data/ships.json?t='+Date.now());
    if(!r.ok)throw 0;
    const d=await r.json();
    shipData=d.vessels||[];
    setLed('sh','live');
    document.getElementById('cnt-sh').textContent=shipData.length;
    document.getElementById('st-sh').textContent=shipData.length;
    animateCounter(document.getElementById('stat-ships'),shipData.length);
    pushShipSrc();
    renderShipList();
  }catch{
    // No ship data yet — that's OK
    shipData=[];
    setLed('sh','stale');
  }
}

// ═══════ MAP DATA PUSH ═══════
function pushEventSrc(){
  const fts=[],ht=[];
  allEvents.forEach(ev=>{
    if(!ev.lat||!ev.lng)return;
    const cat=CATS[ev.category]||CATS.other;
    let lt='event';
    if(ev.category==='thermal_anomaly')lt='thermal';
    else if(ev.category==='earthquake')lt='seismic';
    fts.push({type:'Feature',
      geometry:{type:'Point',coordinates:[ev.lng,ev.lat]},
      properties:{id:ev.id,title:ev.title||'',category:ev.category||'',
        source:ev.source||'',lt,color:cat.color,
        frp:ev.frp||0,mag:ev.magnitude||0,brightness:ev.brightness||0,
        confidence:ev.confidence||'',intensity:ev.intensity||'',
        depth_km:ev.depth_km||0,severity:ev.severity||'',
        place:ev.place||'',url:ev.url||'',sat:ev.satellite||'',
        timestamp:ev.timestamp||'',daynight:ev.daynight||'',felt:ev.felt||0,tsunami:ev.tsunami||0}
    });
    ht.push({type:'Feature',geometry:{type:'Point',coordinates:[ev.lng,ev.lat]},
      properties:{w:ev.frp?Math.min(ev.frp/40,1):0.4}});
  });
  map.getSource('ev-src').setData({type:'FeatureCollection',features:fts});
  map.getSource('heat-src').setData({type:'FeatureCollection',features:ht});
}

function propSats(){
  const now=new Date(),gmst=satellite.gstime(now),fts=[];
  satRecs.forEach(s=>{
    try{
      const pv=satellite.propagate(s.satrec,now);
      if(!pv.position)return;
      const geo=satellite.eciToGeodetic(pv.position,gmst);
      const lng=satellite.degreesLong(geo.longitude);
      const lat=satellite.degreesLat(geo.latitude);
      const g=SATG[s.group]||SATG.resource;
      fts.push({type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},
        properties:{id:'sat-'+s.norad_id,name:s.name,norad_id:s.norad_id,
          group:s.group,grp:g.label,color:g.color,hi:!!s.highlight,
          alt:Math.round(geo.height),type:'satellite',
          owner:s.owner_country||'',owner_flag:s.owner_flag||'',owner_code:s.owner_code||''}});
    }catch{}
  });
  map.getSource('sat-src').setData({type:'FeatureCollection',features:fts});
  document.getElementById('st-sat').textContent=fts.length;
}

function pushFlightSrc(){
  const dt=(Date.now()-flightFetchT)/1000;
  const fts=flightData.map(s=>{
    let lng=s[5],lat=s[6];
    const vel=s[9],hdg=s[10];
    if(dt>0&&vel&&hdg!=null&&!s[8]){
      const r=hdg*Math.PI/180;
      lat+=vel*Math.cos(r)*dt/111320;
      lng+=vel*Math.sin(r)*dt/(111320*Math.cos(lat*Math.PI/180));
    }
    return {type:'Feature',
      geometry:{type:'Point',coordinates:[lng,lat]},
      properties:{id:'fl-'+(s[0]||'').trim(),icao24:(s[0]||'').trim(),
        cs:(s[1]||'').trim(),country:s[2]||'',
        alt:s[7]!=null?Math.round(s[7]):null,vel:s[9]!=null?Math.round(s[9]):null,
        hdg:s[10]||0,ground:!!s[8],type:'flight'}
    };
  });
  map.getSource('fl-src').setData({type:'FeatureCollection',features:fts});
}

function pushShipSrc(){
  const fts=shipData.map(s=>{
    const st=SHIP_TYPES[s.vessel_type]||SHIP_TYPES.Unknown;
    return {type:'Feature',
      geometry:{type:'Point',coordinates:[s.lng,s.lat]},
      properties:{
        id:'ship-'+s.mmsi,name:s.name||'',mmsi:s.mmsi,imo:s.imo||'',
        flag_country:s.flag_country||'',flag_iso:s.flag_iso||'',
        flag_emoji:s.flag_emoji||'',
        vessel_type:s.vessel_type||'Unknown',destination:s.destination||'',
        sog:s.sog!=null?s.sog:null,cog:s.cog!=null?s.cog:null,
        heading:s.heading!=null?s.heading:null,
        draught:s.draught||null,callsign:s.callsign||'',
        color:st.color,type:'ship'}
    };
  });
  map.getSource('ship-src').setData({type:'FeatureCollection',features:fts});
}

// ═══════ GROUND TRACK ═══════
function showTrack(satrec){
  const now=new Date(),coords=[];
  for(let i=0;i<=95;i++){
    const t=new Date(now.getTime()+i*60000);
    try{
      const pv=satellite.propagate(satrec,t);
      if(!pv.position)continue;
      const geo=satellite.eciToGeodetic(pv.position,satellite.gstime(t));
      coords.push([satellite.degreesLong(geo.longitude),satellite.degreesLat(geo.latitude)]);
    }catch{}
  }
  const segs=[[]];
  coords.forEach((c,i)=>{
    segs[segs.length-1].push(c);
    if(i<coords.length-1&&Math.abs(coords[i+1][0]-c[0])>180)segs.push([]);
  });
  const fts=segs.filter(s=>s.length>1).map(seg=>({
    type:'Feature',geometry:{type:'LineString',coordinates:seg}
  }));
  map.getSource('track-src').setData({type:'FeatureCollection',features:fts});
  map.setLayoutProperty('track-l','visibility','visible');
}
function hideTrack(){
  map.getSource('track-src').setData({type:'FeatureCollection',features:[]});
  map.setLayoutProperty('track-l','visibility','none');
}

function setRing(lng,lat){

}
function clearRing(){

function onFeatureClick(p){

  else if(p.type==='flight') showFlDP(p);
  else if(p.type==='ship') showShipDP(p);

// ═══════ DETAIL PANELS ═══════
function fld(lbl,val){return `<div class="dpf"><div class="dplbl">${lbl}</div><div class="dpval">${val}</div></div>`;}
function gauge(pct,grad){return `<div class="dpgauge"><div class="dpgf" style="width:${pct}%;background:${grad}"></div></div>`;}
function setHdr(title,tag,color){
  document.getElementById('dp-title').textContent=title;
  const t=document.getElementById('dp-tag');
  t.textContent=tag;
  t.style.cssText=`background:${color}18;color:${color};border:1px solid ${color}44`;
}
function openDP(bodyHtml,actionsHtml){
  document.getElementById('dp-body').innerHTML=bodyHtml;
  document.getElementById('dp-act').innerHTML=actionsHtml||'';
  document.getElementById('dp').classList.add('open');
  document.getElementById('map').classList.add('dpo');

}
function closeDP(){
  document.getElementById('dp').classList.remove('open');
  document.getElementById('map').classList.remove('dpo');

  setTimeout(()=>map.resize(),240);

function showEvDP(ev){
  const cat=CATS[ev.category]||CATS.other;
  setHdr(ev.title,cat.label,cat.color);
  let h=`<div class="dpcoords"><span>${ev.lat.toFixed(4)}°N</span><span>${ev.lng.toFixed(4)}°E</span></div>`;
  h+=fld('Source',esc(ev.source||'—'));
  h+=fld('Time',fmtFull(ev.timestamp));
  if(ev.category==='earthquake'){
    const mag=ev.magnitude||0;
    const mc=mag>=6?'#ff4455':mag>=5?'#ff9422':mag>=4?'#ffc42e':'#a87fff';
    h+=`<div class="dpf"><div class="dplbl">Magnitude</div>
      <div class="dpmag" style="color:${mc}">M ${mag.toFixed(1)}</div>
      ${gauge(Math.min((mag-2)/6*100,100).toFixed(0),mc)}
    </div>`;
    h+=`<div class="dprow">`;
    h+=fld('Depth',ev.depth_km?ev.depth_km+'\u202fkm':'—');
    h+=fld('Severity',cap(ev.severity||'—'));
    h+=`</div>`;
    h+=fld('Location',esc(ev.place||'—'));
    if(ev.felt)h+=fld('Felt Reports',ev.felt);
    if(ev.tsunami)h+=fld('Tsunami','<span style="color:var(--red);font-weight:600">ALERT</span>');
    if(ev.url)h+=fld('Report',`<a href="${esc(ev.url)}" target="_blank" rel="noopener">USGS event page ↗</a>`);
  }
  if(ev.category==='thermal_anomaly'){
    const frp=ev.frp||0;
    h+=`<div class="dpf"><div class="dplbl">Fire Radiative Power</div>
      <div class="dpval">${frp.toFixed(1)}\u202fMW</div>
      ${gauge(Math.min(frp/80*100,100).toFixed(0),'linear-gradient(90deg,#e05000,#ff4455)')}
    </div>`;
    h+=`<div class="dprow">`;
    h+=fld('Brightness',ev.brightness?ev.brightness.toFixed(1)+'\u202fK':'—');
    h+=fld('Intensity',cap(ev.intensity||'—'));
    h+=`</div>`;
    h+=fld('Confidence',confB(ev.confidence));
    h+=fld('Sensor',esc(ev.satellite||ev.sat||'—'));
    h+=fld('Acquisition',ev.daynight==='D'?'Daytime':ev.daynight==='N'?'Nighttime':'—');
  }
  if(ev.url&&ev.category!=='earthquake'){
    h+=fld('Source Link',`<a href="${esc(ev.url)}" target="_blank" rel="noopener">Open ↗</a>`);
  }
  const flyFn=`map.flyTo({center:[${ev.lng},${ev.lat}],zoom:Math.max(map.getZoom(),7),duration:700})`;
  openDP(h,`<button class="dpbtn prim" onclick="${flyFn}">Fly to Location</button>`);
}

function showSatDP(p){
  const g=SATG[p.group]||SATG.resource;
  setHdr(p.name,g.label,g.color);
  const sr=satById[p.norad_id]||satById[+p.norad_id];
  let h='';
  h+=`<div class="dprow">`;
  h+=fld('NORAD ID',`<span style="font-family:'JetBrains Mono',monospace;font-weight:600">${p.norad_id}</span>`);
  h+=fld('Group',g.label);
  h+=`</div>`;
  // Country of origin
  if(p.owner){
    h+=fld('Country of Origin',`<span class="dp-flag">${p.owner_flag||''}</span> ${esc(p.owner)}`);
  }
  h+=fld('Altitude',p.alt+'\u202fkm');
  if(sr&&sr.satrec){
    const s=sr.satrec;
    const per=(2*Math.PI/s.no).toFixed(1);
    const inc=(s.inclo*180/Math.PI).toFixed(2);
    const sso=s.inclo*180/Math.PI>95.5&&s.inclo*180/Math.PI<100.5;
    h+=`<hr class="dpdiv">`;
    h+=`<div class="dprow">`;
    h+=fld('Orbital Period',per+'\u202fmin');
    h+=fld('Inclination',inc+'°');
    h+=`</div>`;
    h+=fld('Orbit Type',sso?'<span style="color:var(--cyan)">Sun-Synchronous</span>':'Prograde');
    h+=`<hr class="dpdiv">`;
    h+=`<div class="dpf"><div class="dplbl">Ground Track</div>
      <div class="dpval" style="color:var(--t1);font-size:11px">90-min orbital path shown on map</div></div>`;
    const ff=map.querySourceFeatures('sat-src');
    const found=ff.find(f=>f.properties.norad_id==p.norad_id);
    if(found)setRing(found.geometry.coordinates[0],found.geometry.coordinates[1]);
    hideTrack();showTrack(s);
  }else{clearRing();}
  h+=fld('Priority',p.hi?'<span style="color:var(--amber)">Tracked · Priority</span>':'Standard');
  openDP(h,`<button class="dpbtn" onclick="hideTrack()">Clear Track</button>`);
}

function showFlDP(p){
  setHdr(p.cs||p.icao24||'—','ADS-B','#00e88a');
  const hdg=p.hdg||0;
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const dir=dirs[Math.round(hdg/22.5)%16];
  let h='';
  h+=`<div class="dprow">`;
  h+=fld('ICAO24',`<span style="font-family:'JetBrains Mono',monospace;font-weight:600">${p.icao24||'—'}</span>`);
  h+=fld('Callsign',`<span style="font-weight:600">${p.cs||'—'}</span>`);
  h+=`</div>`;
  h+=fld('Origin Country',esc(p.country||'—'));
  h+=`<hr class="dpdiv">`;
  h+=`<div class="dprow">`;
  h+=fld('Altitude',p.alt!=null&&p.alt>100?p.alt.toLocaleString()+'\u202fm':p.ground?'On Ground':'—');
  h+=fld('Speed',p.vel!=null?p.vel+'\u202fm/s':'—');
  h+=`</div>`;
  h+=fld('Heading',hdg+'° '+dir);
  if(p.vel!=null)
    h+=`<div class="dpf" style="margin-top:6px">
      <div class="dplbl">Speed (ref 350 m/s)</div>
      ${gauge(Math.min(p.vel/350*100,100).toFixed(0),'linear-gradient(90deg,#00e88a,#00d4e8)')}
    </div>`;
  if(p.alt!=null&&p.alt>100)
    h+=`<div class="dpf" style="margin-top:8px">
      <div class="dplbl">Altitude (ref 13 000 m)</div>
      ${gauge(Math.min(p.alt/13000*100,100).toFixed(0),'linear-gradient(90deg,#3b9bff,#6eb8ff)')}
    </div>`;
  const ff=map.querySourceFeatures('fl-src');
  const found=ff.find(f=>f.properties.id===p.id);
  if(found)setRing(found.geometry.coordinates[0],found.geometry.coordinates[1]);
  else clearRing();
  hideTrack();
  openDP(h,'');
}

function showShipDP(p){
  const st=SHIP_TYPES[p.vessel_type]||SHIP_TYPES.Unknown;
  setHdr(p.name||'MMSI '+p.mmsi,st.label+' '+(p.flag_emoji||''),st.color);
  const cog=p.cog||0;
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const dir=dirs[Math.round(cog/22.5)%16];
  let h='';
  // Flag display
  if(p.flag_emoji){
    h+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span style="font-size:36px;line-height:1">${p.flag_emoji}</span>

      </div>
    </div>`;
  }
  h+=`<div class="dprow">`;
  h+=fld('MMSI',`<span style="font-family:'JetBrains Mono',monospace;font-weight:600">${p.mmsi||'—'}</span>`);
  h+=fld('IMO',`<span style="font-family:'JetBrains Mono',monospace;font-weight:600">${p.imo||'—'}</span>`);
  h+=`</div>`;
  h+=`<div class="dprow">`;
  h+=fld('Callsign',p.callsign||'—');
  h+=fld('Vessel Type',`<span style="color:${st.color};font-weight:600">${esc(p.vessel_type||'—')}</span>`);
  h+=`</div>`;
  h+=`<hr class="dpdiv">`;
  if(p.destination){
    h+=fld('Destination',`<span style="color:var(--cyan);font-weight:600;font-size:14px">${esc(p.destination)}</span>`);
  }
  h+=`<div class="dprow">`;
  h+=fld('Speed',p.sog!=null?p.sog+'\u202fkn':'—');
  h+=fld('Course',cog.toFixed(1)+'° '+dir);
  h+=`</div>`;
  if(p.heading!=null){
    h+=fld('Heading',p.heading+'°');
  }
  if(p.sog!=null){
    h+=`<div class="dpf" style="margin-top:6px">
      <div class="dplbl">Speed (ref 25 kn)</div>
      ${gauge(Math.min(p.sog/25*100,100).toFixed(0),'linear-gradient(90deg,#00d4e8,#3b9bff)')}
    </div>`;
  }
  if(p.draught){
    h+=`<div class="dpf" style="margin-top:8px">
      <div class="dplbl">Draught (ref 20 m)</div>

      ${gauge(Math.min(p.draught/20*100,100).toFixed(0),'linear-gradient(90deg,#a87fff,#6eb8ff)')}
    </div>`;
  }
  // Find vessel on map for ring
  const ff=map.querySourceFeatures('ship-src');
  const found=ff.find(f=>f.properties.id===p.id);
  if(found)setRing(found.geometry.coordinates[0],found.geometry.coordinates[1]);
  else clearRing();
  hideTrack();
  const flyFn=found?`map.flyTo({center:[${found.geometry.coordinates[0]},${found.geometry.coordinates[1]}],zoom:Math.max(map.getZoom(),8),duration:700})`:'';
  openDP(h,flyFn?`<button class="dpbtn prim" onclick="${flyFn}">Fly to Vessel</button>`:'');
}

// ═══════ EVENT LIST ═══════
function renderList(){
  const c=document.getElementById('evlist');
  const q=query.toLowerCase();c.innerHTML='';
  allEvents.filter(ev=>{
    if(!ev.lat||!ev.lng)return false;
    if(q&&!ev.title.toLowerCase().includes(q)&&!(ev.source||'').includes(q))return false;
    if(ev.category==='thermal_anomaly'&&!layers.thermal)return false;
    if(ev.category==='earthquake'&&!layers.seismic)return false;
    if(ev.category!=='thermal_anomaly'&&ev.category!=='earthquake'&&!layers.events)return false;
    return true;
  }).forEach(ev=>{
    const cat=CATS[ev.category]||CATS.other;
    const d=document.createElement('div');
    d.className='ei'+(selId===ev.id?' sel':'');
    d.innerHTML=`<div class="eidot" style="background:${cat.color};color:${cat.color}"></div>
      <div class="eibody">
        <div class="eititle">${esc(ev.title)}</div>
        <div class="eimeta">
          <span class="eitag">${cat.label}</span>
          <span>${ev.source||''}</span>
          <span class="eitime">${timeAgo(ev.timestamp)}</span>
        </div>
      </div>`;
    d.onclick=()=>{
      selectEv(ev);
      map.flyTo({center:[ev.lng,ev.lat],zoom:Math.max(map.getZoom(),6.5),duration:600});
    };
    c.appendChild(d);
  });
}

function updateCounts(){
  let ev=0,th=0,se=0;
  allEvents.forEach(e=>{
    if(e.category==='thermal_anomaly')th++;
    else if(e.category==='earthquake')se++;
    else ev++;
  });
  document.getElementById('cnt-ev').textContent=ev;
  document.getElementById('cnt-th').textContent=th;
  document.getElementById('cnt-se').textContent=se;
  document.getElementById('total-n').textContent=allEvents.length;
  document.getElementById('st-ev').textContent=allEvents.length;
  // Update stat cards
  const threats=allEvents.filter(e=>e.category==='conflict'||e.category==='military'||e.category==='thermal_anomaly').length;
  animateCounter(document.getElementById('stat-threats'),threats);
}
function renderStats(){
  const cnts={};
  allEvents.forEach(ev=>{
    const c=CATS[ev.category]||CATS.other;
    if(!cnts[c.label])cnts[c.label]={color:c.color,n:0};
    cnts[c.label].n++;
  });
  const tot=allEvents.length||1;
  document.getElementById('catstats').innerHTML=
    Object.entries(cnts).sort((a,b)=>b[1].n-a[1].n)
    .map(([lbl,{color,n}])=>`<div class="strow">
      <div class="stn">${lbl}</div>
      <div class="stb-w"><div class="stb-f" style="width:${(n/tot*100).toFixed(0)}%;background:${color}"></div></div>
      <div class="stc">${n}</div></div>`).join('');
}

// ═══════ HELPERS ═══════
function setLed(id,state){
  document.getElementById('led-'+id).className='led '+state;
  const c=document.getElementById('chip-'+id);
  c.className='chip'+(state==='live'?' live':state==='err'?' err':'');
}
function confB(c){
  return {h:'<span style="color:var(--green)">High</span>',
          n:'<span style="color:var(--amber)">Nominal</span>',
          l:'<span style="color:var(--t2)">Low</span>'}[c]||c||'—';
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'—';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){
  if(!ts)return'';try{const d=new Date(ts);return isNaN(d)?ts:d.toISOString().slice(0,10);}catch{return ts;}
}
function fmtFull(ts){
  if(!ts)return'—';try{const d=new Date(ts);return isNaN(d)?ts:d.toISOString().replace('T',' ').slice(0,16)+' UTC';}catch{return ts;}
}
function timeAgo(ts){
  if(!ts)return'';
  try{
    const d=new Date(ts);
    if(isNaN(d))return ts;
    const sec=Math.floor((Date.now()-d)/1000);
    if(sec<0)return'now';
    if(sec<60)return sec+'s';
    if(sec<3600)return Math.floor(sec/60)+'m';
    if(sec<86400)return Math.floor(sec/3600)+'h';
    return Math.floor(sec/86400)+'d';
  }catch{return ts;}
}
function animateCounter(el,target){
  if(!el)return;
  const start=parseInt(el.textContent)||0;
  const diff=target-start;
  if(diff===0)return;
  const steps=25;let step=0;
  const timer=setInterval(()=>{
    step++;
    el.textContent=Math.round(start+diff*(step/steps));
    if(step>=steps){clearInterval(timer);el.textContent=target;}
  },25);
}
</script>
