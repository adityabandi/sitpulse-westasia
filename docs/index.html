<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITPULSE — West Asia OSINT</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css">
<style>
  :root {
    --bg-primary: #0d1117;
    --bg-secondary: #161b22;
    --bg-tertiary: #1c2128;
    --bg-hover: #21262d;
    --border: #30363d;
    --text-primary: #e6edf3;
    --text-secondary: #8b949e;
    --text-muted: #6e7681;
    --accent-blue: #58a6ff;
    --accent-green: #3fb950;
    --accent-orange: #d29922;
    --accent-red: #f85149;
    --accent-purple: #bc8cff;
    --radius: 6px;
    --sidebar-width: 260px;
    --detail-width: 360px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Top Bar ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0;
    height: 48px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    padding: 0 16px;
    z-index: 100;
    gap: 12px;
  }
  #topbar .brand {
    font-size: 14px; font-weight: 600; letter-spacing: 0.5px;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  #topbar .brand span { color: var(--accent-blue); font-weight: 700; }
  #topbar .sep { width: 1px; height: 24px; background: var(--border); }
  #topbar .region-tag {
    font-size: 11px; color: var(--text-secondary);
    background: var(--bg-tertiary); border: 1px solid var(--border);
    padding: 2px 8px; border-radius: 3px;
  }
  .topbar-right {
    margin-left: auto; display: flex; align-items: center; gap: 16px;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .status-dot.live { background: var(--accent-green); box-shadow: 0 0 4px var(--accent-green); }
  .status-dot.stale { background: var(--accent-orange); }
  .status-dot.off { background: var(--text-muted); }
  .feed-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-secondary);
  }
  #clock {
    font-size: 12px; color: var(--text-secondary); font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }

  /* ── Sidebar ── */
  #sidebar {
    position: fixed; top: 48px; left: 0; bottom: 0;
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    z-index: 90;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  .sidebar-section {
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-section h3 {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); margin-bottom: 10px; font-weight: 600;
  }
  .layer-toggle {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; cursor: pointer; user-select: none;
    font-size: 13px; color: var(--text-secondary);
    transition: color 0.15s;
  }
  .layer-toggle:hover { color: var(--text-primary); }
  .layer-toggle.active { color: var(--text-primary); }
  .layer-toggle .swatch {
    width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0;
  }
  .layer-toggle .count {
    margin-left: auto; font-size: 11px; color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }
  .layer-toggle input[type="checkbox"] { display: none; }
  .layer-toggle .check {
    width: 14px; height: 14px; border-radius: 3px;
    border: 1px solid var(--border); display: flex;
    align-items: center; justify-content: center; flex-shrink: 0;
    transition: all 0.15s;
  }
  .layer-toggle.active .check {
    background: var(--accent-blue); border-color: var(--accent-blue);
  }
  .layer-toggle.active .check::after {
    content: ''; display: block; width: 6px; height: 6px;
    background: #fff; border-radius: 1px;
  }

  /* Event list */
  .event-list {
    flex: 1; overflow-y: auto; padding: 0;
  }
  .event-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 10px 14px; cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .event-item:hover { background: var(--bg-hover); }
  .event-item.selected { background: var(--bg-tertiary); border-left: 2px solid var(--accent-blue); }
  .event-item .dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .event-item .info { flex: 1; min-width: 0; }
  .event-item .title {
    font-size: 12px; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    line-height: 1.4;
  }
  .event-item .meta {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    display: flex; gap: 8px;
  }

  /* ── Map ── */
  #map {
    position: fixed;
    top: 48px; left: var(--sidebar-width); right: 0; bottom: 0;
  }
  #map.detail-open { right: var(--detail-width); }

  .maplibregl-ctrl-attrib { font-size: 9px !important; }

  /* ── Detail Panel ── */
  #detail-panel {
    position: fixed; top: 48px; right: 0; bottom: 0;
    width: var(--detail-width);
    background: var(--bg-secondary);
    border-left: 1px solid var(--border);
    z-index: 95;
    transform: translateX(100%);
    transition: transform 0.2s ease;
    overflow-y: auto;
    display: flex; flex-direction: column;
  }
  #detail-panel.open { transform: translateX(0); }

  .detail-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; background: var(--bg-secondary); z-index: 1;
  }
  .detail-header h2 { font-size: 13px; font-weight: 600; }
  .detail-close {
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer; font-size: 18px; line-height: 1;
    padding: 4px; border-radius: 3px;
  }
  .detail-close:hover { background: var(--bg-hover); color: var(--text-primary); }

  .detail-body { padding: 16px; flex: 1; }
  .detail-body .label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-muted); margin-bottom: 4px; font-weight: 600;
  }
  .detail-body .value {
    font-size: 13px; color: var(--text-primary);
    margin-bottom: 14px; line-height: 1.5;
  }
  .detail-body .value a {
    color: var(--accent-blue); text-decoration: none;
  }
  .detail-body .value a:hover { text-decoration: underline; }
  .detail-tag {
    display: inline-block; font-size: 10px; padding: 2px 8px;
    border-radius: 3px; font-weight: 500;
  }
  .detail-coords {
    font-variant-numeric: tabular-nums; font-size: 12px;
    color: var(--text-secondary); background: var(--bg-tertiary);
    padding: 6px 10px; border-radius: 4px; margin-bottom: 14px;
    font-family: 'SF Mono', SFMono-Regular, Consolas, monospace;
  }

  /* ── Visual Modes ── */
  .mode-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 4px;
    font-size: 11px; cursor: pointer; border: 1px solid var(--border);
    background: var(--bg-tertiary); color: var(--text-secondary);
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--text-muted); color: var(--text-primary); }
  .mode-btn.active {
    border-color: var(--accent-blue); color: var(--accent-blue);
    background: rgba(88,166,255,0.08);
  }

  /* ── Search ── */
  .search-box {
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .search-box input {
    width: 100%; padding: 6px 10px;
    background: var(--bg-tertiary); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-primary); font-size: 12px;
    outline: none; transition: border-color 0.15s;
  }
  .search-box input::placeholder { color: var(--text-muted); }
  .search-box input:focus { border-color: var(--accent-blue); }

  /* ── Bottom Status ── */
  #statusbar {
    position: fixed; bottom: 0; left: var(--sidebar-width); right: 0;
    height: 26px; background: var(--bg-secondary);
    border-top: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 12px; gap: 16px;
    font-size: 10px; color: var(--text-muted); z-index: 80;
    font-variant-numeric: tabular-nums;
  }
  #statusbar .stat { display: flex; align-items: center; gap: 4px; }

  /* Visual mode filters */
  .nvg-active #map canvas { filter: brightness(0.7) saturate(0.3) sepia(0.6) hue-rotate(80deg); }
  .flir-active #map canvas { filter: brightness(0.9) saturate(0) contrast(1.4) invert(1); }
  .crt-active #map canvas { filter: brightness(0.8) contrast(1.3) saturate(0.5) sepia(0.3) hue-rotate(30deg); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topbar">
  <div class="brand"><span>SITPULSE</span> West Asia</div>
  <div class="sep"></div>
  <div class="region-tag">12°N–42°N / 32°E–63°E</div>
  <div class="topbar-right">
    <div class="feed-status">
      <span class="status-dot live" id="dot-events"></span> Events
    </div>
    <div class="feed-status">
      <span class="status-dot off" id="dot-sats"></span> Satellites
    </div>
    <div class="feed-status">
      <span class="status-dot off" id="dot-flights"></span> Flights
    </div>
    <div class="sep"></div>
    <div id="clock">--:--:-- UTC</div>
  </div>
</div>

<!-- Sidebar -->
<div id="sidebar">
  <!-- Layer Toggles -->
  <div class="sidebar-section">
    <h3>Layers</h3>
    <label class="layer-toggle active" data-layer="events">
      <div class="check"></div>
      <div class="swatch" style="background:var(--accent-orange)"></div>
      Events
      <span class="count" id="cnt-events">0</span>
    </label>
    <label class="layer-toggle active" data-layer="thermal">
      <div class="check"></div>
      <div class="swatch" style="background:var(--accent-red)"></div>
      Thermal Hotspots
      <span class="count" id="cnt-thermal">0</span>
    </label>
    <label class="layer-toggle active" data-layer="earthquakes">
      <div class="check"></div>
      <div class="swatch" style="background:var(--accent-purple)"></div>
      Earthquakes
      <span class="count" id="cnt-quakes">0</span>
    </label>
    <label class="layer-toggle active" data-layer="satellites">
      <div class="check"></div>
      <div class="swatch" style="background:var(--accent-blue)"></div>
      Satellites
      <span class="count" id="cnt-sats">0</span>
    </label>
    <label class="layer-toggle active" data-layer="flights">
      <div class="check"></div>
      <div class="swatch" style="background:var(--accent-green)"></div>
      Flights
      <span class="count" id="cnt-flights">0</span>
    </label>
    <label class="layer-toggle" data-layer="heatmap">
      <div class="check"></div>
      <div class="swatch" style="background:linear-gradient(135deg,#f85149,#d29922)"></div>
      Heatmap
    </label>
  </div>

  <!-- Visual Modes -->
  <div class="sidebar-section">
    <h3>Visual Mode</h3>
    <div style="display:flex;gap:6px;flex-wrap:wrap;">
      <button class="mode-btn active" data-mode="default">Default</button>
      <button class="mode-btn" data-mode="nvg">NVG</button>
      <button class="mode-btn" data-mode="flir">FLIR</button>
      <button class="mode-btn" data-mode="crt">CRT</button>
    </div>
  </div>

  <!-- Search -->
  <div class="search-box">
    <input type="text" id="event-search" placeholder="Filter events...">
  </div>

  <!-- Event List -->
  <div class="event-list" id="event-list"></div>
</div>

<!-- Map -->
<div id="map"></div>

<!-- Detail Panel -->
<div id="detail-panel">
  <div class="detail-header">
    <h2 id="detail-title">Details</h2>
    <button class="detail-close" id="detail-close">&times;</button>
  </div>
  <div class="detail-body" id="detail-body"></div>
</div>

<!-- Status Bar -->
<div id="statusbar">
  <div class="stat">Events: <strong id="stat-events">0</strong></div>
  <div class="stat">Satellites: <strong id="stat-sats">0</strong></div>
  <div class="stat">Flights: <strong id="stat-flights">0</strong></div>
  <div class="stat" style="margin-left:auto" id="stat-updated">Last updated: —</div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
<script>
// ════════════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════════════

const CATS = {

const SAT_GROUPS = {

  stations:  { color: '#3fb950', label: 'Stations' },
  starlink:  { color: '#6e7681', label: 'Starlink' }
};

// Fallback events
const SAMPLE_EVENTS = [
  {id:'s1',source:'acled',category:'conflict',title:'Airstrike reported near Marib, Yemen',lat:15.47,lng:45.33,timestamp:'2025-12-01T08:00:00Z'},
  {id:'s2',source:'acled',category:'conflict',title:'Clashes in Idlib province, Syria',lat:35.93,lng:36.63,timestamp:'2025-12-01T10:00:00Z'},
  {id:'s3',source:'gdelt',category:'political',title:'Iran nuclear talks resume in Vienna',lat:35.69,lng:51.39,timestamp:'2025-12-01T12:00:00Z'},
  {id:'s4',source:'acled',category:'conflict',title:'Drone strike in Sana\'a, Yemen',lat:15.35,lng:44.21,timestamp:'2025-12-02T06:00:00Z'},
  {id:'s5',source:'reliefweb',category:'humanitarian',title:'Refugee camp flooding in Lebanon',lat:34.45,lng:35.84,timestamp:'2025-12-02T14:00:00Z'},
  {id:'s6',source:'acled',category:'protest',title:'Anti-government protests in Baghdad',lat:33.31,lng:44.37,timestamp:'2025-12-03T09:00:00Z'},
  {id:'s7',source:'gdelt',category:'military',title:'Naval exercises in Strait of Hormuz',lat:26.57,lng:56.25,timestamp:'2025-12-03T11:00:00Z'},
  {id:'s8',source:'acled',category:'conflict',title:'Artillery shelling near Aleppo',lat:36.20,lng:37.16,timestamp:'2025-12-04T07:00:00Z'},
  {id:'s9',source:'reliefweb',category:'displacement',title:'IDP movement in Deir ez-Zor',lat:35.34,lng:40.14,timestamp:'2025-12-04T15:00:00Z'},
  {id:'s10',source:'gdelt',category:'political',title:'Israel-Palestine ceasefire negotiations',lat:31.77,lng:35.23,timestamp:'2025-12-05T10:00:00Z'},
  {id:'s11',source:'acled',category:'conflict',title:'Car bomb in Kabul, Afghanistan',lat:34.53,lng:69.17,timestamp:'2025-12-05T05:00:00Z'},
  {id:'s12',source:'firms',category:'thermal_anomaly',title:'Large fire detected near Kirkuk oil fields',lat:35.47,lng:44.39,timestamp:'2025-12-05T20:00:00Z'},
  {id:'s13',source:'acled',category:'conflict',title:'Militia clash in Benghazi suburbs',lat:32.12,lng:20.07,timestamp:'2025-12-06T08:00:00Z'},
  {id:'s14',source:'gdelt',category:'political',title:'Saudi-Iran diplomatic meeting',lat:24.71,lng:46.68,timestamp:'2025-12-06T13:00:00Z'},
  {id:'s15',source:'reliefweb',category:'humanitarian',title:'Cholera outbreak in Aden, Yemen',lat:12.78,lng:45.04,timestamp:'2025-12-07T09:00:00Z'},
  {id:'s16',source:'acled',category:'protest',title:'Labor strikes in Tehran',lat:35.70,lng:51.42,timestamp:'2025-12-07T11:00:00Z'},
  {id:'s17',source:'usgs',category:'earthquake',title:'M5.2 earthquake near Van, Turkey',lat:38.49,lng:43.38,timestamp:'2025-12-08T02:00:00Z',magnitude:5.2,depth_km:15},
  {id:'s18',source:'acled',category:'conflict',title:'Cross-border shelling, Lebanon-Israel',lat:33.28,lng:35.45,timestamp:'2025-12-08T16:00:00Z'},
  {id:'s19',source:'firms',category:'thermal_anomaly',title:'Wildfire detected in southeastern Turkey',lat:37.08,lng:41.22,timestamp:'2025-12-09T04:00:00Z'},
  {id:'s20',source:'gdelt',category:'military',title:'US carrier group transits Suez Canal',lat:30.46,lng:32.35,timestamp:'2025-12-09T07:00:00Z'},
  {id:'s21',source:'acled',category:'conflict',title:'IED attack in Mosul',lat:36.34,lng:43.15,timestamp:'2025-12-10T06:00:00Z'},
  {id:'s22',source:'reliefweb',category:'humanitarian',title:'Food aid delivery to Gaza',lat:31.42,lng:34.39,timestamp:'2025-12-10T12:00:00Z'},
  {id:'s23',source:'usgs',category:'earthquake',title:'M4.8 earthquake near Bandar Abbas',lat:27.18,lng:56.27,timestamp:'2025-12-10T23:00:00Z',magnitude:4.8,depth_km:10},
  {id:'s24',source:'acled',category:'conflict',title:'Rocket attack on Erbil airport',lat:36.24,lng:44.01,timestamp:'2025-12-11T01:00:00Z'}
];

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let map, allEvents = [], satellites = [], satRecords = [];
let flightData = [];
let selectedId = null;
let layers = { events: true, thermal: true, earthquakes: true, satellites: true, flights: true, heatmap: false };
let activeMode = 'default';
let searchQuery = '';

// ════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  initClock();
  initMap();
  initLayerToggles();
  initVisualModes();
  initSearch();
  initDetailPanel();
  loadData();
});

function initClock() {
  const el = document.getElementById('clock');
  const tick = () => {
    const d = new Date();
    el.textContent = d.toISOString().slice(11, 19) + ' UTC';
  };
  tick(); setInterval(tick, 1000);
}

// ════════════════════════════════════════════════════════
// MAP
// ════════════════════════════════════════════════════════
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/dark-matter-nolabels-gl-style/style.json',
    center: [47, 28],
    zoom: 4.2,
    minZoom: 3,
    maxZoom: 16,
    attributionControl: true
  });

  map.addControl(new maplibregl.NavigationControl({ showCompass: true }), 'top-right');

  map.on('load', () => {
    addMapSources();
    addMapLayers();
    addMapInteractions();
  });
}

function addMapSources() {
  // Events
  map.addSource('events-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] }
  });
  // Satellites
  map.addSource('sats-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] }
  });
  // Flights
  map.addSource('flights-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] }
  });
  // Heatmap
  map.addSource('heat-src', {
    type: 'geojson',
    data: { type: 'FeatureCollection', features: [] }
  });
}

function addMapLayers() {
  // Heatmap layer
  map.addLayer({
    id: 'heatmap-layer',
    type: 'heatmap',
    source: 'heat-src',
    layout: { visibility: 'none' },
    paint: {
      'heatmap-weight': ['interpolate', ['linear'], ['get', 'weight'], 0, 0, 1, 1],
      'heatmap-intensity': 1.2,
      'heatmap-radius': 25,
      'heatmap-opacity': 0.7,
      'heatmap-color': [
        'interpolate', ['linear'], ['heatmap-density'],
        0, 'rgba(0,0,0,0)',
        0.2, '#1a1a4e',
        0.4, '#5c3d8f',
        0.6, '#e85d5d',
        0.8, '#f09030',
        1, '#ffee60'
      ]
    }
  });

  // Event circles
  map.addLayer({
    id: 'events-circle',
    type: 'circle',
    source: 'events-src',
    filter: ['==', ['get', 'layerType'], 'event'],
    paint: {
      'circle-radius': ['case', ['==', ['get', 'id'], ''], 8, 6],
      'circle-color': ['get', 'color'],
      'circle-opacity': 0.85,
      'circle-stroke-width': 1.5,
      'circle-stroke-color': 'rgba(255,255,255,0.3)'
    }
  });

  // Thermal markers (smaller, denser)
  map.addLayer({
    id: 'thermal-circle',
    type: 'circle',
    source: 'events-src',
    filter: ['==', ['get', 'layerType'], 'thermal'],
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'frp'], 0, 3, 10, 7, 50, 12],
      'circle-color': ['interpolate', ['linear'], ['get', 'frp'],
        0, '#f47061',
        5, '#f85149',
        20, '#ff3333'
      ],
      'circle-opacity': 0.75,
      'circle-stroke-width': 0
    }
  });

  // Earthquake markers
  map.addLayer({
    id: 'quake-circle',
    type: 'circle',
    source: 'events-src',
    filter: ['==', ['get', 'layerType'], 'earthquake'],
    paint: {
      'circle-radius': ['interpolate', ['linear'], ['get', 'magnitude'], 3, 5, 5, 10, 7, 18],
      'circle-color': '#bc8cff',
      'circle-opacity': 0.8,
      'circle-stroke-width': 2,
      'circle-stroke-color': 'rgba(188,140,255,0.4)'
    }
  });

  // Satellite dots
  map.addLayer({
    id: 'sats-circle',
    type: 'circle',
    source: 'sats-src',
    paint: {
      'circle-radius': ['case', ['get', 'highlight'], 4, 2.5],
      'circle-color': ['get', 'color'],
      'circle-opacity': ['case', ['get', 'highlight'], 0.95, 0.6],
      'circle-stroke-width': 0
    }
  });

  // Satellite labels (only for highlighted at higher zoom)
  map.addLayer({
    id: 'sats-label',
    type: 'symbol',
    source: 'sats-src',
    filter: ['==', ['get', 'highlight'], true],
    layout: {
      'text-field': ['get', 'name'],
      'text-size': 9,
      'text-offset': [0, 1.2],
      'text-anchor': 'top',
      'text-allow-overlap': false,
      'text-optional': true
    },
    paint: {
      'text-color': '#8b949e',
      'text-halo-color': '#0d1117',
      'text-halo-width': 1
    }
  });

  // Flight icons (triangle/arrow-like using symbol)
  map.addLayer({
    id: 'flights-circle',
    type: 'circle',
    source: 'flights-src',
    paint: {
      'circle-radius': 4,
      'circle-color': '#3fb950',
      'circle-opacity': 0.8,
      'circle-stroke-width': 1,
      'circle-stroke-color': 'rgba(63,185,80,0.3)'
    }
  });

  // Flight labels
  map.addLayer({
    id: 'flights-label',
    type: 'symbol',
    source: 'flights-src',
    minzoom: 6,
    layout: {
      'text-field': ['get', 'callsign'],
      'text-size': 9,
      'text-offset': [0, 1.2],
      'text-anchor': 'top',
      'text-allow-overlap': false,
      'text-optional': true
    },
    paint: {
      'text-color': '#3fb950',
      'text-halo-color': '#0d1117',
      'text-halo-width': 1
    }
  });
}

function addMapInteractions() {
  const pointer = () => map.getCanvas().style.cursor = 'pointer';
  const noPointer = () => map.getCanvas().style.cursor = '';

  ['events-circle','thermal-circle','quake-circle','sats-circle','flights-circle'].forEach(id => {
    map.on('mouseenter', id, pointer);
    map.on('mouseleave', id, noPointer);
    map.on('click', id, (e) => {
      e.preventDefault();
      const f = e.features[0];
      if (f) selectFeature(f.properties, id);
    });
  });

  // Deselect on empty click
  map.on('click', (e) => {
    const fs = map.queryRenderedFeatures(e.point, {
      layers: ['events-circle','thermal-circle','quake-circle','sats-circle','flights-circle']
    });
    if (fs.length === 0) closeDetail();
  });
}

// ════════════════════════════════════════════════════════
// DATA LOADING
// ════════════════════════════════════════════════════════
async function loadData() {
  await Promise.all([
    loadEvents(),
    loadSatellites()
  ]);
  loadFlights();
  setInterval(loadFlights, 15000);
}

async function loadEvents() {
  try {
    const res = await fetch('data/combined.json');
    const data = await res.json();
    if (data.events && data.events.length > 0) {
      allEvents = data.events;
    } else {
      allEvents = SAMPLE_EVENTS;
    }
  } catch (e) {
    console.warn('Combined data unavailable, using samples', e);
    allEvents = SAMPLE_EVENTS;
  }

  document.getElementById('dot-events').className = 'status-dot live';
  updateEventCounts();
  renderEventList();
  updateEventSources();
}

async function loadSatellites() {
  try {
    const res = await fetch('data/satellites.json');
    const data = await res.json();
    satellites = data.satellites || [];
    satRecords = satellites.map(s => {
      try {
        return { ...s, satrec: satellite.twoline2satrec(s.tle1, s.tle2) };
      } catch { return null; }
    }).filter(Boolean);

    document.getElementById('dot-sats').className = 'status-dot live';
    document.getElementById('cnt-sats').textContent = satRecords.length;
    document.getElementById('stat-sats').textContent = satRecords.length;
    propagateSatellites();
    setInterval(propagateSatellites, 3000);
  } catch (e) {
    console.warn('Satellites unavailable', e);
  }
}

async function loadFlights() {
  try {
    const res = await fetch(OPENSKY_URL);
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    flightData = (data.states || []).filter(s => s[5] != null && s[6] != null);
    document.getElementById('dot-flights').className = 'status-dot live';
    document.getElementById('cnt-flights').textContent = flightData.length;
    document.getElementById('stat-flights').textContent = flightData.length;
    updateFlightSource();
  } catch (e) {
    // OpenSky often rate-limits; keep last data
    if (flightData.length === 0) {
      document.getElementById('dot-flights').className = 'status-dot stale';
    }
  }
}

// ════════════════════════════════════════════════════════
// UPDATE MAP SOURCES
// ════════════════════════════════════════════════════════
function updateEventSources() {
  const features = [];
  const heatFeatures = [];

  allEvents.forEach(ev => {
    if (!ev.lat || !ev.lng) return;
    const cat = CATS[ev.category] || CATS.other;
    let layerType = 'event';
    if (ev.category === 'thermal_anomaly') layerType = 'thermal';
    else if (ev.category === 'earthquake') layerType = 'earthquake';

    const props = {
      id: ev.id,
      title: ev.title,
      category: ev.category,
      source: ev.source,
      layerType,
      color: cat.color,
      timestamp: ev.timestamp || '',
      frp: ev.frp || 0,
      magnitude: ev.magnitude || 0,
      brightness: ev.brightness || 0,
      confidence: ev.confidence || '',
      intensity: ev.intensity || '',
      depth_km: ev.depth_km || 0,
      severity: ev.severity || '',
      place: ev.place || '',
      url: ev.url || '',
      sat: ev.satellite || ''
    };

    features.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [ev.lng, ev.lat] },
      properties: props
    });

    heatFeatures.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: [ev.lng, ev.lat] },
      properties: { weight: ev.frp ? Math.min(ev.frp / 20, 1) : 0.5 }
    });
  });

  map.getSource('events-src').setData({ type: 'FeatureCollection', features });
  map.getSource('heat-src').setData({ type: 'FeatureCollection', features: heatFeatures });

  const ts = new Date().toISOString().slice(11,19) + ' UTC';
  document.getElementById('stat-updated').textContent = 'Updated: ' + ts;
}

function propagateSatellites() {
  const now = new Date();
  const gmst = satellite.gstime(now);
  const features = [];

  satRecords.forEach(s => {
    try {
      const pv = satellite.propagate(s.satrec, now);
      if (!pv.position) return;
      const geo = satellite.eciToGeodetic(pv.position, gmst);
      const lng = satellite.degreesLong(geo.longitude);
      const lat = satellite.degreesLat(geo.latitude);
      const alt = geo.height;

      // Filter to extended region for satellites
      if (lat < -10 || lat > 70 || lng < -10 || lng > 100) return;

      const grp = SAT_GROUPS[s.group] || SAT_GROUPS.resource;
      features.push({
        type: 'Feature',
        geometry: { type: 'Point', coordinates: [lng, lat] },
        properties: {
          id: 'sat-' + s.norad_id,
          name: s.name,
          norad_id: s.norad_id,
          group: s.group,
          groupLabel: grp.label,
          color: grp.color,
          highlight: !!s.highlight,
          alt_km: Math.round(alt),
          type: 'satellite'
        }
      });
    } catch {}
  });

  map.getSource('sats-src').setData({ type: 'FeatureCollection', features });
  document.getElementById('stat-sats').textContent = features.length;
}

function updateFlightSource() {
  const features = flightData.map(s => ({
    type: 'Feature',
    geometry: { type: 'Point', coordinates: [s[5], s[6]] },
    properties: {
      id: 'flight-' + (s[0] || '').trim(),
      icao24: (s[0] || '').trim(),
      callsign: (s[1] || '').trim(),
      origin_country: s[2] || '',
      altitude: s[7] != null ? Math.round(s[7]) : null,
      velocity: s[9] != null ? Math.round(s[9]) : null,
      heading: s[10] || 0,
      on_ground: s[8],
      type: 'flight'
    }
  }));

  map.getSource('flights-src').setData({ type: 'FeatureCollection', features });
}

// ════════════════════════════════════════════════════════
// EVENT LIST
// ════════════════════════════════════════════════════════
function updateEventCounts() {
  let thermal = 0, quakes = 0, events = 0;
  allEvents.forEach(ev => {
    if (ev.category === 'thermal_anomaly') thermal++;
    else if (ev.category === 'earthquake') quakes++;
    else events++;
  });
  document.getElementById('cnt-events').textContent = events;
  document.getElementById('cnt-thermal').textContent = thermal;
  document.getElementById('cnt-quakes').textContent = quakes;
  document.getElementById('stat-events').textContent = allEvents.length;
}

function renderEventList() {
  const container = document.getElementById('event-list');
  const q = searchQuery.toLowerCase();
  container.innerHTML = '';

  const filtered = allEvents.filter(ev => {
    if (q && !ev.title.toLowerCase().includes(q) && !(ev.source||'').toLowerCase().includes(q)) return false;
    if (ev.category === 'thermal_anomaly' && !layers.thermal) return false;
    if (ev.category === 'earthquake' && !layers.earthquakes) return false;
    if (ev.category !== 'thermal_anomaly' && ev.category !== 'earthquake' && !layers.events) return false;
    return true;
  });

  filtered.forEach(ev => {
    const cat = CATS[ev.category] || CATS.other;
    const div = document.createElement('div');
    div.className = 'event-item' + (selectedId === ev.id ? ' selected' : '');
    div.innerHTML = `
      <div class="dot" style="background:${cat.color}"></div>
      <div class="info">
        <div class="title">${esc(ev.title)}</div>
        <div class="meta">
          <span>${cat.label}</span>
          <span>${ev.source}</span>
          <span>${formatTs(ev.timestamp)}</span>
        </div>
      </div>
    `;
    div.addEventListener('click', () => {
      selectEventById(ev.id);
      if (ev.lat && ev.lng) map.flyTo({ center: [ev.lng, ev.lat], zoom: Math.max(map.getZoom(), 7) });
    });
    container.appendChild(div);
  });
}

// ════════════════════════════════════════════════════════
// DETAIL PANEL
// ════════════════════════════════════════════════════════
function initDetailPanel() {
  document.getElementById('detail-close').addEventListener('click', closeDetail);
}

function selectFeature(props, layerId) {
  if (props.type === 'satellite') {
    showSatelliteDetail(props);
  } else if (props.type === 'flight') {
    showFlightDetail(props);
  } else {
    // It's an event
    selectEventById(props.id);
  }
}

function selectEventById(id) {
  selectedId = id;
  const ev = allEvents.find(e => e.id === id);
  if (!ev) return;
  showEventDetail(ev);
  renderEventList();
}

function showEventDetail(ev) {
  const cat = CATS[ev.category] || CATS.other;
  const panel = document.getElementById('detail-panel');
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');

  title.textContent = cat.label + ' Event';

  let html = `
    <div class="value" style="font-size:14px;font-weight:500;margin-bottom:16px;">${esc(ev.title)}</div>
    <div class="detail-tag" style="background:${cat.color}22;color:${cat.color};border:1px solid ${cat.color}44;margin-bottom:14px;">
      ${cat.label}
    </div>
  `;

  if (ev.lat && ev.lng) {
    html += `<div class="detail-coords">${ev.lat.toFixed(4)}°N, ${ev.lng.toFixed(4)}°E</div>`;
  }

  html += field('Source', ev.source);
  html += field('Time', formatTsFull(ev.timestamp));

  if (ev.category === 'earthquake') {
    html += field('Magnitude', ev.magnitude ? 'M ' + ev.magnitude : '—');
    html += field('Depth', ev.depth_km ? ev.depth_km + ' km' : '—');
    html += field('Severity', ev.severity || '—');
    html += field('Location', ev.place || '—');
    if (ev.url) html += field('Details', `<a href="${ev.url}" target="_blank" rel="noopener">USGS Event Page</a>`);
  }

  if (ev.category === 'thermal_anomaly') {
    html += field('FRP', ev.frp ? ev.frp.toFixed(1) + ' MW' : '—');
    html += field('Brightness', ev.brightness ? ev.brightness.toFixed(1) + ' K' : '—');
    html += field('Confidence', ev.confidence || '—');
    html += field('Intensity', ev.intensity || '—');
    html += field('Sensor', ev.satellite || ev.sat || '—');
    html += field('Day/Night', ev.daynight === 'D' ? 'Day' : ev.daynight === 'N' ? 'Night' : '—');
  }

  body.innerHTML = html;
  openDetail();
}

function showSatelliteDetail(props) {
  const panel = document.getElementById('detail-panel');
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');
  selectedId = props.id;

  title.textContent = 'Satellite';

  let html = `
    <div class="value" style="font-size:14px;font-weight:500;margin-bottom:16px;">${esc(props.name)}</div>
    <div class="detail-tag" style="background:${props.color}22;color:${props.color};border:1px solid ${props.color}44;margin-bottom:14px;">
      ${props.groupLabel}
    </div>
  `;

  html += field('NORAD ID', props.norad_id);
  html += field('Group', props.groupLabel);
  html += field('Altitude', props.alt_km + ' km');
  html += field('Tracked', props.highlight ? 'Priority' : 'Standard');

  body.innerHTML = html;
  openDetail();
}

function showFlightDetail(props) {
  const title = document.getElementById('detail-title');
  const body = document.getElementById('detail-body');
  selectedId = props.id;

  title.textContent = 'Aircraft';

  let html = `
    <div class="value" style="font-size:14px;font-weight:500;margin-bottom:16px;">${esc(props.callsign || props.icao24)}</div>
    <div class="detail-tag" style="background:var(--accent-green);color:#fff;margin-bottom:14px;">
      ADS-B
    </div>
  `;

  html += field('ICAO24', props.icao24);
  html += field('Callsign', props.callsign || '—');
  html += field('Origin', props.origin_country || '—');
  html += field('Altitude', props.altitude != null ? props.altitude + ' m' : '—');
  html += field('Velocity', props.velocity != null ? props.velocity + ' m/s' : '—');
  html += field('Heading', props.heading ? props.heading + '°' : '—');
  html += field('On Ground', props.on_ground ? 'Yes' : 'No');

  body.innerHTML = html;
  openDetail();
}

function openDetail() {
  document.getElementById('detail-panel').classList.add('open');
  document.getElementById('map').classList.add('detail-open');
  map.resize();
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  document.getElementById('map').classList.remove('detail-open');
  selectedId = null;
  renderEventList();
  setTimeout(() => map.resize(), 220);
}

function field(label, value) {
  return `<div class="label">${label}</div><div class="value">${value}</div>`;
}

// ════════════════════════════════════════════════════════
// LAYER TOGGLES
// ════════════════════════════════════════════════════════
function initLayerToggles() {
  document.querySelectorAll('.layer-toggle').forEach(el => {
    el.addEventListener('click', () => {
      const layer = el.dataset.layer;
      layers[layer] = !layers[layer];
      el.classList.toggle('active', layers[layer]);
      applyLayerVisibility();
      renderEventList();
    });
  });
}

function applyLayerVisibility() {
  const vis = (v) => v ? 'visible' : 'none';

  // Events = non-thermal, non-earthquake
  map.setLayoutProperty('events-circle', 'visibility', vis(layers.events));
  map.setLayoutProperty('thermal-circle', 'visibility', vis(layers.thermal));
  map.setLayoutProperty('quake-circle', 'visibility', vis(layers.earthquakes));
  map.setLayoutProperty('sats-circle', 'visibility', vis(layers.satellites));
  map.setLayoutProperty('sats-label', 'visibility', vis(layers.satellites));
  map.setLayoutProperty('flights-circle', 'visibility', vis(layers.flights));
  map.setLayoutProperty('flights-label', 'visibility', vis(layers.flights));
  map.setLayoutProperty('heatmap-layer', 'visibility', vis(layers.heatmap));
}

// ════════════════════════════════════════════════════════
// VISUAL MODES
// ════════════════════════════════════════════════════════
function initVisualModes() {
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const mode = btn.dataset.mode;
      document.body.classList.remove('nvg-active', 'flir-active', 'crt-active');
      if (mode !== 'default') document.body.classList.add(mode + '-active');
      activeMode = mode;
    });
  });
}

// ════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════
function initSearch() {
  const input = document.getElementById('event-search');
  input.addEventListener('input', () => {
    searchQuery = input.value.trim();
    renderEventList();
  });
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════
function esc(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatTs(ts) {
  if (!ts) return '';
  try {
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toISOString().slice(0,10);
  } catch { return ts; }
}

function formatTsFull(ts) {
  if (!ts) return '—';
  try {
    const d = new Date(ts);
    if (isNaN(d)) return ts;
    return d.toISOString().replace('T',' ').slice(0,19) + ' UTC';
  } catch { return ts; }
}
