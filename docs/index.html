<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SITPULSE · West Asia OSINT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.css">
<style>
:root {
  --bg0:#04090f;--bg1:#070d18;--bg2:#0b1520;--bg3:#101d2e;--bg4:#162638;--bg5:#1d3248;
  --bd1:#142030;--bd2:#1b2e44;--bd3:#254160;
  --t0:#ddeaf6;--t1:#8aaec8;--t2:#4d6e8a;--t3:#253c52;
  --blue:#2b8df8;--bluel:#5eaaff;--blued:#0e5bc4;
  --green:#00cc7a;--red:#ff3b3b;--orange:#ff8c00;--amber:#ffb700;
  --purple:#9b72ff;--cyan:#00bcd4;
  --sb:268px;--dp:366px;--tb:46px;--stb:24px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;
  font-family:'Inter',-apple-system,sans-serif;
  background:var(--bg0);color:var(--t0);font-size:13px;
  -webkit-font-smoothing:antialiased}

/* TOP BAR */
#topbar{position:fixed;top:0;left:0;right:0;height:var(--tb);
  background:var(--bg1);border-bottom:1px solid var(--bd2);
  display:flex;align-items:center;padding:0 14px;gap:10px;z-index:200}
.brand{font-size:14px;font-weight:600;letter-spacing:2px;
  text-transform:uppercase;color:var(--bluel);flex-shrink:0}
.brand-sep{color:var(--t3);font-weight:300;margin:0 2px}
.brand-sub{font-size:11px;letter-spacing:1px;color:var(--t2);font-weight:400}
.vdiv{width:1px;height:20px;background:var(--bd2);flex-shrink:0}
.rpill{font-family:'JetBrains Mono',monospace;font-size:10px;
  color:var(--t1);background:var(--bg3);border:1px solid var(--bd2);
  padding:2px 9px;border-radius:2px;white-space:nowrap}
.chips{display:flex;align-items:center;gap:6px;margin-left:auto}
.chip{display:flex;align-items:center;gap:5px;font-size:10px;
  color:var(--t2);padding:3px 8px;background:var(--bg2);
  border:1px solid var(--bd1);border-radius:2px;transition:all .2s;letter-spacing:.3px}
.chip.live{color:var(--t1);border-color:var(--bd2)}
.chip.err{color:var(--red);border-color:rgba(255,59,59,.25)}
.led{width:6px;height:6px;border-radius:50%;background:var(--t3);
  flex-shrink:0;transition:background .3s}
.led.live{background:var(--green);box-shadow:0 0 5px var(--green);
  animation:bp 2.5s ease-in-out infinite}
.led.stale{background:var(--amber)}
.led.err{background:var(--red)}
@keyframes bp{0%,100%{opacity:1}50%{opacity:.35}}
#clock{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--t1);letter-spacing:.5px;min-width:80px;text-align:right}

/* SIDEBAR */
#sb{position:fixed;top:var(--tb);left:0;bottom:var(--stb);
  width:var(--sb);background:var(--bg1);border-right:1px solid var(--bd2);
  z-index:100;display:flex;flex-direction:column;overflow:hidden}
.sbs{border-bottom:1px solid var(--bd1);flex-shrink:0}
.sbh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px 8px}
.sbh h3{font-size:9px;text-transform:uppercase;letter-spacing:1.2px;color:var(--t2);font-weight:600}
.sbh .sbn{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t1)}
.sbd{padding:2px 12px 10px}
.lrow{display:flex;align-items:center;gap:7px;padding:5px 0;cursor:pointer;
  user-select:none;transition:opacity .15s}
.lrow:not(.on){opacity:.4}
.lrow:hover{opacity:.8}
.lrow.on{opacity:1}
.lchk{width:13px;height:13px;border-radius:2px;border:1px solid var(--bd3);
  flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.lrow.on .lchk{background:var(--blue);border-color:var(--blue)}
.lrow.on .lchk::after{content:'✓';font-size:8px;color:#fff;line-height:1}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lname{font-size:12px;color:var(--t0);flex:1}
.lcnt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2)}
.mrow{display:flex;gap:4px;flex-wrap:wrap;padding:3px 0}
.mbtn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 9px;
  letter-spacing:.5px;border-radius:2px;cursor:pointer;font-weight:500;
  background:var(--bg3);border:1px solid var(--bd2);color:var(--t2);transition:all .15s}
.mbtn:hover{color:var(--t0);border-color:var(--bd3)}
.mbtn.on{color:var(--bluel);border-color:var(--blue);background:rgba(43,141,248,.1)}
.strow{display:flex;align-items:center;gap:7px;padding:3px 0}
.stn{font-size:10px;color:var(--t1);width:72px;flex-shrink:0}
.stb-w{flex:1;height:3px;background:var(--bg5);border-radius:2px;overflow:hidden}
.stb-f{height:100%;border-radius:2px;transition:width .5s ease}
.stc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);
  width:22px;text-align:right}
.swrap{padding:7px 12px;border-bottom:1px solid var(--bd1);flex-shrink:0}
.swrap input{width:100%;padding:5px 8px;background:var(--bg3);
  border:1px solid var(--bd2);border-radius:3px;color:var(--t0);
  font-size:11px;font-family:inherit;outline:none;transition:border-color .15s}
.swrap input::placeholder{color:var(--t3)}
.swrap input:focus{border-color:var(--blue)}
#evlist{flex:1;overflow-y:auto;min-height:0}
#evlist::-webkit-scrollbar{width:3px}
#evlist::-webkit-scrollbar-thumb{background:var(--bd3);border-radius:2px}
.ei{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;cursor:pointer;
  border-bottom:1px solid var(--bd1);border-left:2px solid transparent;
  transition:background .1s,border-left-color .1s}
.ei:hover{background:var(--bg3)}
.ei.sel{background:var(--bg3);border-left-color:var(--blue)}
.eidot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.eibody{flex:1;min-width:0}
.eititle{font-size:11px;color:var(--t0);line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.eimeta{display:flex;gap:5px;margin-top:2px;font-size:9px;color:var(--t2)}
.eitag{background:var(--bg4);padding:0 4px;border-radius:2px}

/* MAP */
#map{position:fixed;top:var(--tb);left:var(--sb);right:0;bottom:var(--stb);
  transition:right .22s ease}
#map.dpo{right:var(--dp)}
.maplibregl-ctrl-attrib{font-size:9px!important;opacity:.4!important}
.maplibregl-ctrl-group{background:var(--bg2)!important;
  border:1px solid var(--bd2)!important;box-shadow:0 2px 8px rgba(0,0,0,.5)!important}
.maplibregl-ctrl button{background:transparent!important}
.maplibregl-ctrl button span{filter:invert(.6)}

/* DETAIL PANEL */
#dp{position:fixed;top:var(--tb);right:0;bottom:var(--stb);
  width:var(--dp);background:var(--bg1);border-left:1px solid var(--bd2);
  z-index:150;transform:translateX(100%);transition:transform .22s ease;
  display:flex;flex-direction:column;overflow:hidden}
#dp.open{transform:translateX(0)}
.dph{display:flex;align-items:center;gap:8px;padding:12px 14px;
  border-bottom:1px solid var(--bd2);flex-shrink:0}
.dptag{font-family:'JetBrains Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:1px;font-weight:500;
  padding:2px 7px;border-radius:2px;flex-shrink:0}
.dptitle{font-size:13px;font-weight:500;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t0)}
.dpx{background:none;border:none;color:var(--t2);cursor:pointer;
  font-size:16px;padding:2px 5px;border-radius:2px;line-height:1;transition:color .15s}
.dpx:hover{color:var(--t0)}
.dpbody{flex:1;overflow-y:auto;padding:14px}
.dpbody::-webkit-scrollbar{width:3px}
.dpbody::-webkit-scrollbar-thumb{background:var(--bd3)}
.dpcoords{font-family:'JetBrains Mono',monospace;font-size:11px;
  color:var(--bluel);background:var(--bg2);border:1px solid var(--bd2);
  padding:6px 10px;border-radius:3px;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center}
.dpf{margin-bottom:12px}
.dplbl{font-size:9px;text-transform:uppercase;letter-spacing:.9px;
  color:var(--t2);margin-bottom:3px;font-weight:600}
.dpval{font-size:12px;color:var(--t0);line-height:1.5}
.dpval a{color:var(--bluel);text-decoration:none}
.dpval a:hover{text-decoration:underline}
.dpgauge{height:5px;background:var(--bg4);border-radius:3px;margin-top:5px;overflow:hidden}
.dpgf{height:100%;border-radius:3px;transition:width .5s}
.dpmag{font-family:'JetBrains Mono',monospace;font-size:40px;
  font-weight:600;line-height:1;margin-bottom:4px}
.dprow{display:flex;gap:12px}
.dprow .dpf{flex:1}
.dpdiv{border:none;border-top:1px solid var(--bd1);margin:10px 0}
.dpact{padding:10px 14px;border-top:1px solid var(--bd1);
  display:flex;gap:6px;flex-shrink:0}
.dpbtn{flex:1;padding:6px 12px;border-radius:3px;font-size:11px;
  cursor:pointer;font-weight:500;border:1px solid var(--bd2);
  background:var(--bg3);color:var(--t1);transition:all .15s;font-family:inherit}
.dpbtn:hover{background:var(--bg4);color:var(--t0);border-color:var(--bd3)}
.dpbtn.prim{background:rgba(43,141,248,.12);border-color:var(--blue);color:var(--bluel)}
.dpbtn.prim:hover{background:rgba(43,141,248,.22)}

/* STATUS BAR */
#stbar{position:fixed;bottom:0;left:var(--sb);right:0;
  height:var(--stb);background:var(--bg1);border-top:1px solid var(--bd1);
  display:flex;align-items:center;padding:0 10px;gap:14px;
  font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t2);z-index:100}
.ss{display:flex;align-items:center;gap:4px}
.ss b{color:var(--t1)}
#curpos{margin-left:auto;color:var(--t3)}

/* TOOLTIP */
#tip{position:fixed;display:none;z-index:300;background:var(--bg2);
  border:1px solid var(--bd3);color:var(--t0);font-size:10px;
  padding:4px 8px;border-radius:3px;pointer-events:none;
  box-shadow:0 2px 10px rgba(0,0,0,.5);max-width:220px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* VISUAL MODES */
.nvg #map canvas{filter:brightness(.6) saturate(.15) sepia(.9) hue-rotate(95deg)}
.flir #map canvas{filter:invert(1) sepia(.4) contrast(1.4) saturate(.25)}
.crt #map canvas{filter:brightness(.7) contrast(1.3) sepia(.45) saturate(.7) hue-rotate(18deg)}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">SITPULSE<span class="brand-sep"> / </span><span class="brand-sub">West Asia</span></div>
  <div class="vdiv"></div>
  <div class="rpill">12°N–42°N · 32°E–63°E</div>
  <div class="chips">
    <div class="chip" id="chip-ev"><span class="led" id="led-ev"></span>Events</div>
    <div class="chip" id="chip-sat"><span class="led" id="led-sat"></span>Satellites</div>
    <div class="chip" id="chip-fl"><span class="led" id="led-fl"></span>ADS-B</div>
    <div class="vdiv"></div>
    <div id="clock">--:--:-- UTC</div>
  </div>
</div>

<div id="sb">
  <div class="sbs">
    <div class="sbh"><h3>Layers</h3><span class="sbn" id="total-n">0</span></div>
    <div class="sbd">
      <label class="lrow on" data-layer="events">
        <div class="lchk"></div><div class="ldot" style="background:var(--orange)"></div>
        <span class="lname">Intel Events</span><span class="lcnt" id="cnt-ev">0</span>
      </label>
      <label class="lrow on" data-layer="thermal">
        <div class="lchk"></div><div class="ldot" style="background:var(--red)"></div>
        <span class="lname">Thermal Anomalies</span><span class="lcnt" id="cnt-th">0</span>
      </label>
      <label class="lrow on" data-layer="seismic">
        <div class="lchk"></div><div class="ldot" style="background:var(--purple)"></div>
        <span class="lname">Seismic</span><span class="lcnt" id="cnt-se">0</span>
      </label>
      <label class="lrow on" data-layer="satellites">
        <div class="lchk"></div><div class="ldot" style="background:var(--blue)"></div>
        <span class="lname">Satellites</span><span class="lcnt" id="cnt-sat">0</span>
      </label>
      <label class="lrow on" data-layer="flights">
        <div class="lchk"></div><div class="ldot" style="background:var(--green)"></div>
        <span class="lname">Aircraft (ADS-B)</span><span class="lcnt" id="cnt-fl">0</span>
      </label>
      <label class="lrow" data-layer="heatmap">
        <div class="lchk"></div><div class="ldot" style="background:linear-gradient(135deg,var(--red),var(--amber))"></div>
        <span class="lname">Heat Density</span>
      </label>
    </div>
  </div>
  <div class="sbs">
    <div class="sbh"><h3>Visual Mode</h3></div>
    <div class="sbd">
      <div class="mrow">
        <button class="mbtn on" data-mode="default">STD</button>
        <button class="mbtn" data-mode="nvg">NVG</button>
        <button class="mbtn" data-mode="flir">FLIR</button>
        <button class="mbtn" data-mode="crt">CRT</button>
      </div>
    </div>
  </div>
  <div class="sbs">
    <div class="sbh"><h3>Category Breakdown</h3></div>
    <div class="sbd" id="catstats"></div>
  </div>
  <div class="swrap">
    <input type="text" id="evsearch" placeholder="Filter events…">
  </div>
  <div id="evlist"></div>
</div>

<div id="map"></div>

<div id="dp">
  <div class="dph">
    <div class="dptag" id="dp-tag"></div>
    <div class="dptitle" id="dp-title"></div>
    <button class="dpx" id="dp-x">✕</button>
  </div>
  <div class="dpbody" id="dp-body"></div>
  <div class="dpact" id="dp-act"></div>
</div>

<div id="stbar">
  <div class="ss">Events <b id="st-ev">0</b></div>
  <div class="ss">Sats <b id="st-sat">0</b></div>
  <div class="ss">ADS-B <b id="st-fl">0</b></div>
  <div class="ss" id="st-upd" style="color:var(--t3)">—</div>
  <div id="curpos"></div>
</div>
<div id="tip"></div>

<script src="https://unpkg.com/maplibre-gl@4.1.3/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/satellite.js@5.0.0/dist/satellite.min.js"></script>
<script>
'use strict';
// ═══════ CONFIG ═══════
const CATS = {
  conflict:       {color:'#ff4757',label:'Conflict'},
  protest:        {color:'#ff8c00',label:'Protest'},
  humanitarian:   {color:'#58a6ff',label:'Humanitarian'},
  earthquake:     {color:'#9b72ff',label:'Seismic'},
  thermal_anomaly:{color:'#ff3b3b',label:'Thermal'},
  political:      {color:'#79c0ff',label:'Political'},
  military:       {color:'#ff8c00',label:'Military'},
  displacement:   {color:'#56d364',label:'Displacement'},
  other:          {color:'#6e8a9e',label:'Other'}
};
const SATG = {
  military:{color:'#ff8c00',label:'Military'},
  radar:   {color:'#ff3b3b',label:'Radar Cal'},
  resource:{color:'#2b8df8',label:'Earth Obs'},
  stations:{color:'#00cc7a',label:'Stations'},
  starlink:{color:'#2e4a62',label:'Starlink'}
};
const SAMPLES=[
  {id:'s1',source:'acled',category:'conflict',title:'Airstrike near Marib, Yemen',lat:15.47,lng:45.33,timestamp:'2025-12-01T08:00:00Z'},
  {id:'s2',source:'acled',category:'conflict',title:'Clashes in Idlib province, Syria',lat:35.93,lng:36.63,timestamp:'2025-12-01T10:00:00Z'},
  {id:'s3',source:'gdelt',category:'political',title:'Iran nuclear talks in Vienna',lat:35.69,lng:51.39,timestamp:'2025-12-01T12:00:00Z'},
  {id:'s4',source:'acled',category:'conflict',title:"Drone strike in Sana'a, Yemen",lat:15.35,lng:44.21,timestamp:'2025-12-02T06:00:00Z'},
  {id:'s5',source:'reliefweb',category:'humanitarian',title:'Refugee camp flooding, Lebanon',lat:34.45,lng:35.84,timestamp:'2025-12-02T14:00:00Z'},
  {id:'s6',source:'acled',category:'protest',title:'Anti-government protests, Baghdad',lat:33.31,lng:44.37,timestamp:'2025-12-03T09:00:00Z'},
  {id:'s7',source:'gdelt',category:'military',title:'Naval exercises, Strait of Hormuz',lat:26.57,lng:56.25,timestamp:'2025-12-03T11:00:00Z'},
  {id:'s8',source:'acled',category:'conflict',title:'Artillery shelling near Aleppo',lat:36.20,lng:37.16,timestamp:'2025-12-04T07:00:00Z'},
  {id:'s9',source:'reliefweb',category:'displacement',title:'IDP movement in Deir ez-Zor',lat:35.34,lng:40.14,timestamp:'2025-12-04T15:00:00Z'},
  {id:'s10',source:'gdelt',category:'political',title:'Israel-Palestine ceasefire talks',lat:31.77,lng:35.23,timestamp:'2025-12-05T10:00:00Z'},
  {id:'s11',source:'acled',category:'conflict',title:'Car bomb in Kabul',lat:34.53,lng:69.17,timestamp:'2025-12-05T05:00:00Z'},
  {id:'s12',source:'acled',category:'military',title:'Rocket attack on Erbil airport',lat:36.24,lng:44.01,timestamp:'2025-12-11T01:00:00Z'},
  {id:'s13',source:'reliefweb',category:'humanitarian',title:'Cholera outbreak in Aden',lat:12.78,lng:45.04,timestamp:'2025-12-07T09:00:00Z'},
  {id:'s14',source:'gdelt',category:'military',title:'US carrier group transits Suez',lat:30.46,lng:32.35,timestamp:'2025-12-09T07:00:00Z'},
  {id:'s15',source:'acled',category:'protest',title:'Labor strikes in Tehran',lat:35.70,lng:51.42,timestamp:'2025-12-07T11:00:00Z'},
  {id:'s16',source:'usgs',category:'earthquake',title:'M5.2 near Van, Turkey',lat:38.49,lng:43.38,timestamp:'2025-12-08T02:00:00Z',magnitude:5.2,depth_km:15},
  {id:'s17',source:'usgs',category:'earthquake',title:'M4.8 near Bandar Abbas, Iran',lat:27.18,lng:56.27,timestamp:'2025-12-10T23:00:00Z',magnitude:4.8,depth_km:10},
  {id:'s18',source:'acled',category:'conflict',title:'Cross-border shelling, Lebanon-Israel',lat:33.28,lng:35.45,timestamp:'2025-12-08T16:00:00Z'},
  {id:'s19',source:'acled',category:'conflict',title:'IED attack in Mosul',lat:36.34,lng:43.15,timestamp:'2025-12-10T06:00:00Z'},
  {id:'s20',source:'reliefweb',category:'humanitarian',title:'Food aid delivery to Gaza',lat:31.42,lng:34.39,timestamp:'2025-12-10T12:00:00Z'},
  {id:'s21',source:'gdelt',category:'political',title:'Saudi-Iran diplomatic meeting',lat:24.71,lng:46.68,timestamp:'2025-12-06T13:00:00Z'},
  {id:'s22',source:'acled',category:'displacement',title:'Civilian evacuation in Rafah',lat:31.28,lng:34.25,timestamp:'2025-12-09T09:00:00Z'},
  {id:'s23',source:'firms',category:'thermal_anomaly',title:'Large fire near Kirkuk oil fields',lat:35.47,lng:44.39,timestamp:'2025-12-05T20:00:00Z',frp:18.4,brightness:382,confidence:'h',intensity:'medium',satellite:'VIIRS_NOAA20_NRT',daynight:'N'},
  {id:'s24',source:'reliefweb',category:'humanitarian',title:'Aid convoy blocked in Syria',lat:35.01,lng:38.51,timestamp:'2025-12-03T16:00:00Z'}
];

// ═══════ STATE ═══════
let map,allEvents=[],satRecs=[],satById={},flightData=[];
let selId=null,selLng=null,selLat=null;
let layers={events:true,thermal:true,seismic:true,satellites:true,flights:true,heatmap:false};
let mode='default',query='',pulsePhase=0;

// ═══════ BOOT ═══════
document.addEventListener('DOMContentLoaded',()=>{
  startClock();
  initMap();
  initLayers();
  initModes();
  initSearch();
  document.getElementById('dp-x').onclick=closeDP;
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDP();});
});

function startClock(){
  const el=document.getElementById('clock');
  const t=()=>el.textContent=new Date().toISOString().slice(11,19)+' UTC';
  t();setInterval(t,1000);
}

// ═══════ MAP ═══════
function initMap(){
  map=new maplibregl.Map({
    container:'map',
    style:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
    center:[47,28],zoom:4.2,minZoom:2,maxZoom:18,attributionControl:true
  });
  map.addControl(new maplibregl.NavigationControl({showCompass:true}),'top-right');
  map.addControl(new maplibregl.ScaleControl({unit:'metric'}),'bottom-right');
  map.on('mousemove',e=>{
    const el=document.getElementById('curpos');
    el.textContent=e.lngLat.lat.toFixed(3)+'°N  '+e.lngLat.lng.toFixed(3)+'°E';
  });
  // ── CRITICAL: data loads AFTER map ready ──
  map.on('load',()=>{
    addSources();
    addLayers();
    addInteractions();
    startPulse();
    loadData();
  });
}

function addInteractions(){
  const tip=document.getElementById('tip');
  const cls=['ev-l','th-l','se-l','sat-l','fl-l'];
  const showTip=(e,txt)=>{
    if(!txt)return;
    tip.textContent=txt;tip.style.display='block';
    tip.style.left=(e.originalEvent.clientX+14)+'px';
    tip.style.top=(e.originalEvent.clientY-30)+'px';
  };
  const hideTip=()=>tip.style.display='none';
  cls.forEach(id=>{
    map.on('mouseenter',id,e=>{
      map.getCanvas().style.cursor='pointer';
      const p=e.features[0].properties;
      showTip(e,p.name||p.title||p.cs||p.icao24||'');
    });
    map.on('mouseleave',id,()=>{map.getCanvas().style.cursor='';hideTip();});
    map.on('click',id,e=>{
      e.originalEvent.stopPropagation();hideTip();
      onFeatureClick(e.features[0].properties);
    });
  });
  map.on('click',e=>{
    if(!map.queryRenderedFeatures(e.point,{layers:cls}).length)closeDP();
  });
}

function startPulse(){
  const go=()=>{
    pulsePhase+=0.04;
    if(selLng!==null&&map.getLayer('sel-ring')){
      map.setPaintProperty('sel-ring','circle-radius',13+4*Math.sin(pulsePhase));
      map.setPaintProperty('sel-ring','circle-stroke-opacity',0.5+0.35*Math.sin(pulsePhase));
    }
    requestAnimationFrame(go);
  };
  requestAnimationFrame(go);
}

// ═══════ DATA ═══════
async function loadData(){
  await Promise.all([loadEvents(),loadSats()]);
  loadFlights();setInterval(loadFlights,15000);
}

async function loadEvents(){
  try{
    const r=await fetch('data/combined.json');
    if(!r.ok)throw 0;
    const d=await r.json();
    allEvents=(d.events&&d.events.length>0)?d.events:SAMPLES;
  }catch{allEvents=SAMPLES;}
  setLed('ev','live');
  pushEventSrc();renderList();renderStats();updateCounts();
  document.getElementById('st-upd').textContent='Updated '+new Date().toISOString().slice(11,16)+'Z';
}

async function loadSats(){
  try{
    const r=await fetch('data/satellites.json');
    if(!r.ok)throw 0;
    const d=await r.json();
    satRecs=(d.satellites||[]).map(s=>{
      try{const sr=satellite.twoline2satrec(s.tle1,s.tle2);
        const rec={...s,satrec:sr};satById[s.norad_id]=rec;return rec;}
      catch{return null;}
    }).filter(Boolean);
    setLed('sat','live');
    document.getElementById('cnt-sat').textContent=satRecs.length;
    document.getElementById('st-sat').textContent=satRecs.length;
    propSats();setInterval(propSats,3000);
  }catch(e){console.warn('Sats failed',e);setLed('sat','err');}
}

async function loadFlights(){
  try{
    const r=await fetch('https://opensky-network.org/api/states/all?lamin=12&lomin=32&lamax=42&lomax=63');
    if(!r.ok)throw 0;
    const d=await r.json();
    flightData=(d.states||[]).filter(s=>s[5]!=null&&s[6]!=null);
    setLed('fl','live');
    document.getElementById('cnt-fl').textContent=flightData.length;
    document.getElementById('st-fl').textContent=flightData.length;
    pushFlightSrc();
  }catch{if(!flightData.length)setLed('fl','stale');}
}

// ═══════ MAP DATA PUSH ═══════
function pushEventSrc(){
  const fts=[],ht=[];
  allEvents.forEach(ev=>{
    if(!ev.lat||!ev.lng)return;
    const cat=CATS[ev.category]||CATS.other;
    let lt='event';
    if(ev.category==='thermal_anomaly')lt='thermal';
    else if(ev.category==='earthquake')lt='seismic';
    fts.push({type:'Feature',
      geometry:{type:'Point',coordinates:[ev.lng,ev.lat]},
      properties:{id:ev.id,title:ev.title||'',category:ev.category||'',
        source:ev.source||'',lt,color:cat.color,
        frp:ev.frp||0,mag:ev.magnitude||0,brightness:ev.brightness||0,
        confidence:ev.confidence||'',intensity:ev.intensity||'',
        depth_km:ev.depth_km||0,severity:ev.severity||'',
        place:ev.place||'',url:ev.url||'',sat:ev.satellite||'',
        timestamp:ev.timestamp||'',daynight:ev.daynight||'',felt:ev.felt||0,tsunami:ev.tsunami||0}
    });
    ht.push({type:'Feature',geometry:{type:'Point',coordinates:[ev.lng,ev.lat]},
      properties:{w:ev.frp?Math.min(ev.frp/40,1):0.4}});
  });
  map.getSource('ev-src').setData({type:'FeatureCollection',features:fts});
  map.getSource('heat-src').setData({type:'FeatureCollection',features:ht});
}

function propSats(){
  const now=new Date(),gmst=satellite.gstime(now),fts=[];
  satRecs.forEach(s=>{
    try{
      const pv=satellite.propagate(s.satrec,now);
      if(!pv.position)return;
      const geo=satellite.eciToGeodetic(pv.position,gmst);
      const lng=satellite.degreesLong(geo.longitude);
      const lat=satellite.degreesLat(geo.latitude);
      if(lat<-20||lat>75||lng<-20||lng>110)return;
      const g=SATG[s.group]||SATG.resource;
      fts.push({type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},
        properties:{id:'sat-'+s.norad_id,name:s.name,norad_id:s.norad_id,
          group:s.group,grp:g.label,color:g.color,hi:!!s.highlight,
          alt:Math.round(geo.height),type:'satellite'}});
    }catch{}
  });
  map.getSource('sat-src').setData({type:'FeatureCollection',features:fts});
  document.getElementById('st-sat').textContent=fts.length;
}

function pushFlightSrc(){
  const fts=flightData.map(s=>({type:'Feature',
    geometry:{type:'Point',coordinates:[s[5],s[6]]},
    properties:{id:'fl-'+(s[0]||'').trim(),icao24:(s[0]||'').trim(),
      cs:(s[1]||'').trim(),country:s[2]||'',
      alt:s[7]!=null?Math.round(s[7]):null,vel:s[9]!=null?Math.round(s[9]):null,
      hdg:s[10]||0,ground:!!s[8],type:'flight'}
  }));
  map.getSource('fl-src').setData({type:'FeatureCollection',features:fts});
}

// ═══════ GROUND TRACK ═══════
function showTrack(satrec){
  const now=new Date(),coords=[];
  for(let i=0;i<=95;i++){
    const t=new Date(now.getTime()+i*60000);
    try{
      const pv=satellite.propagate(satrec,t);
      if(!pv.position)continue;
      const geo=satellite.eciToGeodetic(pv.position,satellite.gstime(t));
      coords.push([satellite.degreesLong(geo.longitude),satellite.degreesLat(geo.latitude)]);
    }catch{}
  }
  const segs=[[]];
  coords.forEach((c,i)=>{
    segs[segs.length-1].push(c);
    if(i<coords.length-1&&Math.abs(coords[i+1][0]-c[0])>180)segs.push([]);
  });
  const fts=segs.filter(s=>s.length>1).map(seg=>({
    type:'Feature',geometry:{type:'LineString',coordinates:seg}
  }));
  map.getSource('track-src').setData({type:'FeatureCollection',features:fts});
  map.setLayoutProperty('track-l','visibility','visible');
}
function hideTrack(){
  map.getSource('track-src').setData({type:'FeatureCollection',features:[]});
  map.setLayoutProperty('track-l','visibility','none');
}

// ═══════ SELECTION ═══════
function setRing(lng,lat){
  selLng=lng;selLat=lat;
  map.getSource('sel-src').setData({type:'FeatureCollection',
    features:[{type:'Feature',geometry:{type:'Point',coordinates:[lng,lat]},properties:{}}]});
}
function clearRing(){
  selLng=null;selLat=null;
  map.getSource('sel-src').setData({type:'FeatureCollection',features:[]});
}

// ═══════ CLICK DISPATCH ═══════
function onFeatureClick(p){
  if(p.type==='satellite') showSatDP(p);
  else if(p.type==='flight') showFlDP(p);
  else {const ev=allEvents.find(e=>e.id===p.id);if(ev)selectEv(ev);}
}
function selectEv(ev){
  selId=ev.id;renderList();setRing(ev.lng,ev.lat);hideTrack();showEvDP(ev);
}

// ═══════ DETAIL PANELS ═══════
function fld(lbl,val){return `<div class="dpf"><div class="dplbl">${lbl}</div><div class="dpval">${val}</div></div>`;}
function gauge(pct,grad){return `<div class="dpgauge"><div class="dpgf" style="width:${pct}%;background:${grad}"></div></div>`;}
function setHdr(title,tag,color){
  document.getElementById('dp-title').textContent=title;
  const t=document.getElementById('dp-tag');
  t.textContent=tag;
  t.style.cssText=`background:${color}22;color:${color};border:1px solid ${color}55`;
}
function openDP(bodyHtml,actionsHtml){
  document.getElementById('dp-body').innerHTML=bodyHtml;
  document.getElementById('dp-act').innerHTML=actionsHtml||'';
  document.getElementById('dp').classList.add('open');
  document.getElementById('map').classList.add('dpo');
  map.resize();
}
function closeDP(){
  document.getElementById('dp').classList.remove('open');
  document.getElementById('map').classList.remove('dpo');
  selId=null;clearRing();hideTrack();renderList();
  setTimeout(()=>map.resize(),240);
}

function showEvDP(ev){
  const cat=CATS[ev.category]||CATS.other;
  setHdr(ev.title,cat.label,cat.color);
  let h=`<div class="dpcoords"><span>${ev.lat.toFixed(4)}°N</span><span>${ev.lng.toFixed(4)}°E</span></div>`;
  h+=fld('Source',esc(ev.source||'—'));
  h+=fld('Time',fmtFull(ev.timestamp));
  if(ev.category==='earthquake'){
    const mag=ev.magnitude||0;
    const mc=mag>=6?'#ff3b3b':mag>=5?'#ff8c00':mag>=4?'#ffb700':'#9b72ff';
    h+=`<div class="dpf"><div class="dplbl">Magnitude</div>
      <div class="dpmag" style="color:${mc}">M ${mag.toFixed(1)}</div>
      ${gauge(Math.min((mag-2)/6*100,100).toFixed(0),mc)}
    </div>`;
    h+=`<div class="dprow">`;
    h+=fld('Depth',ev.depth_km?ev.depth_km+'\u202fkm':'—');
    h+=fld('Severity',cap(ev.severity||'—'));
    h+=`</div>`;
    h+=fld('Location',esc(ev.place||'—'));
    if(ev.felt)h+=fld('Felt Reports',ev.felt);
    if(ev.tsunami)h+=fld('Tsunami','<span style="color:var(--red);font-weight:600">ALERT</span>');
    if(ev.url)h+=fld('Report',`<a href="${esc(ev.url)}" target="_blank" rel="noopener">USGS event page ↗</a>`);
  }
  if(ev.category==='thermal_anomaly'){
    const frp=ev.frp||0;
    h+=`<div class="dpf"><div class="dplbl">Fire Radiative Power</div>
      <div class="dpval">${frp.toFixed(1)}\u202fMW</div>
      ${gauge(Math.min(frp/80*100,100).toFixed(0),'linear-gradient(90deg,#e05000,#ff3b3b)')}
    </div>`;
    h+=`<div class="dprow">`;
    h+=fld('Brightness',ev.brightness?ev.brightness.toFixed(1)+'\u202fK':'—');
    h+=fld('Intensity',cap(ev.intensity||'—'));
    h+=`</div>`;
    h+=fld('Confidence',confB(ev.confidence));
    h+=fld('Sensor',esc(ev.satellite||ev.sat||'—'));
    h+=fld('Acquisition',ev.daynight==='D'?'Daytime':ev.daynight==='N'?'Nighttime':'—');
  }
  const flyFn=`map.flyTo({center:[${ev.lng},${ev.lat}],zoom:Math.max(map.getZoom(),7),duration:700})`;
  openDP(h,`<button class="dpbtn prim" onclick="${flyFn}">Fly to Location</button>`);
}

function showSatDP(p){
  const g=SATG[p.group]||SATG.resource;
  setHdr(p.name,g.label,g.color);
  const sr=satById[p.norad_id]||satById[+p.norad_id];
  let h='';
  h+=`<div class="dprow">`;
  h+=fld('NORAD ID',`<span style="font-family:'JetBrains Mono',monospace">${p.norad_id}</span>`);
  h+=fld('Group',g.label);
  h+=`</div>`;
  h+=fld('Altitude',p.alt+'\u202fkm');
  if(sr&&sr.satrec){
    const s=sr.satrec;
    const per=(2*Math.PI/s.no).toFixed(1);
    const inc=(s.inclo*180/Math.PI).toFixed(2);
    const sso=s.inclo*180/Math.PI>95.5&&s.inclo*180/Math.PI<100.5;
    h+=`<hr class="dpdiv">`;
    h+=`<div class="dprow">`;
    h+=fld('Orbital Period',per+'\u202fmin');
    h+=fld('Inclination',inc+'°');
    h+=`</div>`;
    h+=fld('Orbit Type',sso?'<span style="color:var(--cyan)">Sun-Synchronous</span>':'Prograde');
    h+=`<hr class="dpdiv">`;
    h+=`<div class="dpf"><div class="dplbl">Ground Track</div>
      <div class="dpval" style="color:var(--t1);font-size:11px">90-min orbital path shown on map</div></div>`;
    // show track immediately
    const ff=map.querySourceFeatures('sat-src');
    const found=ff.find(f=>f.properties.norad_id==p.norad_id);
    if(found)setRing(found.geometry.coordinates[0],found.geometry.coordinates[1]);
    hideTrack();showTrack(s);
  }else{clearRing();}
  h+=fld('Priority',p.hi?'<span style="color:var(--amber)">Tracked · Priority</span>':'Standard');
  openDP(h,`<button class="dpbtn" onclick="hideTrack()">Clear Track</button>`);
}

function showFlDP(p){
  setHdr(p.cs||p.icao24||'—','ADS-B · OpenSky','#00cc7a');
  const hdg=p.hdg||0;
  const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
  const dir=dirs[Math.round(hdg/22.5)%16];
  let h='';
  h+=`<div class="dprow">`;
  h+=fld('ICAO24',`<span style="font-family:'JetBrains Mono',monospace">${p.icao24||'—'}</span>`);
  h+=fld('Callsign',p.cs||'—');
  h+=`</div>`;
  h+=fld('Origin Country',esc(p.country||'—'));
  h+=`<hr class="dpdiv">`;
  h+=`<div class="dprow">`;
  h+=fld('Altitude',p.alt!=null&&p.alt>100?p.alt+'\u202fm':p.ground?'On Ground':'—');
  h+=fld('Speed',p.vel!=null?p.vel+'\u202fm/s':'—');
  h+=`</div>`;
  h+=fld('Heading',hdg+'° '+dir);
  if(p.vel!=null)
    h+=`<div class="dpf" style="margin-top:6px">
      <div class="dplbl">Speed (ref 350 m/s)</div>
      ${gauge(Math.min(p.vel/350*100,100).toFixed(0),'var(--green)')}
    </div>`;
  if(p.alt!=null&&p.alt>100)
    h+=`<div class="dpf" style="margin-top:8px">
      <div class="dplbl">Altitude (ref 13 000 m)</div>
      ${gauge(Math.min(p.alt/13000*100,100).toFixed(0),'var(--bluel)')}
    </div>`;
  const ff=map.querySourceFeatures('fl-src');
  const found=ff.find(f=>f.properties.id===p.id);
  if(found)setRing(found.geometry.coordinates[0],found.geometry.coordinates[1]);
  else clearRing();
  hideTrack();
  openDP(h,'');
}

// ═══════ EVENT LIST ═══════
function renderList(){
  const c=document.getElementById('evlist');
  const q=query.toLowerCase();c.innerHTML='';
  allEvents.filter(ev=>{
    if(!ev.lat||!ev.lng)return false;
    if(q&&!ev.title.toLowerCase().includes(q)&&!(ev.source||'').includes(q))return false;
    if(ev.category==='thermal_anomaly'&&!layers.thermal)return false;
    if(ev.category==='earthquake'&&!layers.seismic)return false;
    if(ev.category!=='thermal_anomaly'&&ev.category!=='earthquake'&&!layers.events)return false;
    return true;
  }).forEach(ev=>{
    const cat=CATS[ev.category]||CATS.other;
    const d=document.createElement('div');
    d.className='ei'+(selId===ev.id?' sel':'');
    d.innerHTML=`<div class="eidot" style="background:${cat.color}"></div>
      <div class="eibody">
        <div class="eititle">${esc(ev.title)}</div>
        <div class="eimeta">
          <span class="eitag">${cat.label}</span>
          <span>${ev.source||''}</span>
          <span>${fmtDate(ev.timestamp)}</span>
        </div>
      </div>`;
    d.onclick=()=>{
      selectEv(ev);
      map.flyTo({center:[ev.lng,ev.lat],zoom:Math.max(map.getZoom(),6.5),duration:600});
    };
    c.appendChild(d);
  });
}

// ═══════ COUNTS / STATS ═══════
function updateCounts(){
  let ev=0,th=0,se=0;
  allEvents.forEach(e=>{
    if(e.category==='thermal_anomaly')th++;
    else if(e.category==='earthquake')se++;
    else ev++;
  });
  document.getElementById('cnt-ev').textContent=ev;
  document.getElementById('cnt-th').textContent=th;
  document.getElementById('cnt-se').textContent=se;
  document.getElementById('total-n').textContent=allEvents.length;
  document.getElementById('st-ev').textContent=allEvents.length;
}
function renderStats(){
  const cnts={};
  allEvents.forEach(ev=>{
    const c=CATS[ev.category]||CATS.other;
    if(!cnts[c.label])cnts[c.label]={color:c.color,n:0};
    cnts[c.label].n++;
  });
  const tot=allEvents.length||1;
  document.getElementById('catstats').innerHTML=
    Object.entries(cnts).sort((a,b)=>b[1].n-a[1].n)
    .map(([lbl,{color,n}])=>`<div class="strow">
      <div class="stn">${lbl}</div>
      <div class="stb-w"><div class="stb-f" style="width:${(n/tot*100).toFixed(0)}%;background:${color}"></div></div>
      <div class="stc">${n}</div></div>`).join('');
}

// ═══════ LAYER TOGGLES ═══════
function initLayers(){
  document.querySelectorAll('.lrow').forEach(el=>{
    el.addEventListener('click',()=>{
      const k=el.dataset.layer;
      layers[k]=!layers[k];
      el.classList.toggle('on',layers[k]);
      if(map.loaded())applyVis();
      renderList();
    });
  });
}
function applyVis(){
  if(!map.loaded())return;
  const v=b=>b?'visible':'none';
  map.setLayoutProperty('ev-l','visibility',v(layers.events));
  map.setLayoutProperty('th-l','visibility',v(layers.thermal));
  map.setLayoutProperty('se-l','visibility',v(layers.seismic));
  map.setLayoutProperty('sat-l','visibility',v(layers.satellites));
  map.setLayoutProperty('sat-lbl','visibility',v(layers.satellites));
  map.setLayoutProperty('fl-l','visibility',v(layers.flights));
  map.setLayoutProperty('fl-lbl','visibility',v(layers.flights));
  map.setLayoutProperty('heat-l','visibility',v(layers.heatmap));
}

// ═══════ VISUAL MODES ═══════
function initModes(){
  document.querySelectorAll('.mbtn').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.mbtn').forEach(b=>b.classList.remove('on'));
      btn.classList.add('on');
      const m=btn.dataset.mode;
      document.body.classList.remove('nvg','flir','crt');
      if(m!=='default')document.body.classList.add(m);
      mode=m;
    };
  });
}

// ═══════ SEARCH ═══════
function initSearch(){
  document.getElementById('evsearch').oninput=e=>{query=e.target.value.trim();renderList();};
}

// ═══════ HELPERS ═══════
function setLed(id,state){
  document.getElementById('led-'+id).className='led '+state;
  const c=document.getElementById('chip-'+id);
  c.className='chip'+(state==='live'?' live':state==='err'?' err':'');
}
function confB(c){
  return {h:'<span style="color:var(--green)">High</span>',
          n:'<span style="color:var(--amber)">Nominal</span>',
          l:'<span style="color:var(--t2)">Low</span>'}[c]||c||'—';
}
function cap(s){return s?s.charAt(0).toUpperCase()+s.slice(1):'—';}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtDate(ts){
  if(!ts)return'';try{const d=new Date(ts);return isNaN(d)?ts:d.toISOString().slice(0,10);}catch{return ts;}
}
function fmtFull(ts){
  if(!ts)return'—';try{const d=new Date(ts);return isNaN(d)?ts:d.toISOString().replace('T',' ').slice(0,16)+' UTC';}catch{return ts;}
}
