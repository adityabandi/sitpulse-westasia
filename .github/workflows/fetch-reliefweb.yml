name: Fetch ReliefWeb Updates

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-reliefweb:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and normalize ReliefWeb data
        run: python scripts/normalize-reliefweb.py

      - name: Commit data
        run: |
          git config user.name "SitPulse Bot"
          git config user.email "bot@sitpulse.dev"
          git add data/
          git diff --cached --quiet || git commit -m "🏥 ReliefWeb update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
