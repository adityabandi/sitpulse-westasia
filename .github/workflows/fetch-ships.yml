name: Fetch Ship AIS Data

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-ships:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests websockets

      - name: Fetch AIS ship data
        env:
          AISSTREAM_KEY: ${{ secrets.AISSTREAM_KEY }}
        run: python scripts/fetch-ships.py

      - name: Commit data
        run: |
          git config user.name "SitPulse Bot"
          git config user.email "bot@sitpulse.dev"
          git add data/
          git diff --cached --quiet || git commit -m "🚢 Ship AIS update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
